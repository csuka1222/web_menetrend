<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heti menetrend 🐱</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
html { background: #14151f; }
body {
  margin: 0;
  color: #E9EBF8;
  font-family: 'Nunito', 'Segoe UI', system-ui, sans-serif;
  background:
    radial-gradient(900px 500px at 85% -10%, rgba(198,160,246,0.13), transparent 60%),
    radial-gradient(700px 450px at -10% 25%, rgba(138,173,244,0.09), transparent 60%),
    radial-gradient(600px 400px at 60% 110%, rgba(245,189,230,0.07), transparent 60%),
    #14151f;
  background-attachment: fixed;
  min-height: 100vh;
}
#app { max-width: 1100px; margin: 0 auto; padding: 24px 16px 90px; }
button { font-family: inherit; cursor: pointer; transition: all .18s ease; }
::selection { background: rgba(198,160,246,0.35); }

@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
@keyframes popIn { from { opacity: 0; transform: translate(-50%, 12px) scale(.95); } to { opacity: 1; transform: translate(-50%, 0) scale(1); } }
@keyframes modalIn { from { opacity: 0; transform: translateY(24px) scale(.97); } to { opacity: 1; transform: none; } }
@keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }

.header { display: flex; flex-wrap: wrap; gap: 14px; justify-content: space-between; align-items: flex-end; margin-bottom: 16px; }
.title { font-size: 28px; font-weight: 800; margin: 0 0 8px; letter-spacing: -0.5px;
  background: linear-gradient(120deg, #E9EBF8 30%, #C6A0F6 70%, #F5BDE6 100%);
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.title .cat { -webkit-text-fill-color: initial; font-size: 24px; }
.weekrow { display: flex; align-items: center; gap: 8px; }
.weeklabel { font-size: 14px; opacity: 0.85; display: flex; align-items: center; gap: 8px; font-weight: 600; }
.nowbadge { font-size: 11px; font-weight: 800; background: linear-gradient(120deg, rgba(198,160,246,0.22), rgba(245,189,230,0.18)); color: #D5B8FA; padding: 3px 10px; border-radius: 999px; border: 1px solid rgba(198,160,246,0.35); }
.tabs { display: flex; gap: 4px; background: rgba(32,34,47,0.7); padding: 4px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.06); backdrop-filter: blur(8px); }
.headright { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
.headbtns { display: flex; gap: 6px; }

.navbtn { width: 32px; height: 32px; border-radius: 11px; border: 1px solid rgba(255,255,255,0.08); background: rgba(32,34,47,0.8); color: #E9EBF8; font-size: 15px; }
.navbtn:hover { background: rgba(44,46,62,0.9); border-color: rgba(198,160,246,0.4); transform: translateY(-1px); }
.navbtn.wide { width: auto; padding: 0 13px; font-size: 13px; font-weight: 700; }

.minibtn { border: 1px solid rgba(255,255,255,0.08); background: rgba(32,34,47,0.8); color: #b9bccf; font-size: 12px; font-weight: 700; padding: 7px 12px; border-radius: 11px; }
.minibtn:hover { color: #E9EBF8; border-color: rgba(198,160,246,0.4); transform: translateY(-1px); }

.goldbadge { font-size: 13px; font-weight: 900; color: #EED49F; background: rgba(238,212,159,0.1); border: 1px solid rgba(238,212,159,0.3); padding: 5px 12px; border-radius: 999px; margin-left: 4px; font-variant-numeric: tabular-nums; box-shadow: 0 0 14px rgba(238,212,159,0.1); }
.goldnum { color: #EED49F; text-shadow: 0 0 20px rgba(238,212,159,0.3); }
.goldrates { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 14px; }
.goldrate { font-size: 11px; font-weight: 800; border: 1px solid; border-radius: 999px; padding: 4px 10px; opacity: 0.85; }

.statgenre { display: block; font-size: 10.5px; font-weight: 700; opacity: 0.5; margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ecgenre { display: block; font-size: 11.5px; font-weight: 800; opacity: 0.6; margin-top: 1px; }

.tab { border: none; background: transparent; color: #9a9db5; padding: 8px 18px; border-radius: 11px; font-weight: 800; font-size: 14px; position: relative; }
.tab:hover:not(.on) { color: #c9ccdf; }
.tab.on { background: linear-gradient(120deg, #C6A0F6, #B18AF0); color: #14151f; box-shadow: 0 4px 16px rgba(198,160,246,0.35); }
.warnDot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #ED8796; margin-left: 6px; box-shadow: 0 0 8px rgba(237,135,150,0.8); }

.limitbar { border-radius: 14px; padding: 11px 16px; font-size: 13px; font-weight: 800; margin-bottom: 16px; animation: fadeUp .3s ease; backdrop-filter: blur(6px); }
.limitbar.over { background: rgba(237,135,150,0.12); color: #F0A3AE; border: 1px solid rgba(237,135,150,0.35); box-shadow: 0 4px 20px rgba(237,135,150,0.12); }
.limitbar.near { background: rgba(238,212,159,0.1); color: #EED49F; border: 1px solid rgba(238,212,159,0.3); }

.daytabs { display: flex; gap: 6px; margin-bottom: 14px; }
.daytab { flex: 1; padding: 10px 0; border-radius: 13px; border: 1px solid rgba(255,255,255,0.07); background: rgba(30,32,48,0.75); color: #9a9db5; font-weight: 800; position: relative; font-size: 14px; }
.daytab:hover:not(.on) { border-color: rgba(255,255,255,0.15); color: #c9ccdf; }
.daytab.on { background: linear-gradient(150deg, rgba(198,160,246,0.22), rgba(198,160,246,0.08)); border-color: rgba(198,160,246,0.55); color: #D5B8FA; box-shadow: 0 4px 14px rgba(198,160,246,0.15); }
.daytab.today:not(.on)::after { content: ""; position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%); width: 14px; height: 3px; border-radius: 3px; background: rgba(198,160,246,0.5); }
.daytab .dot { position: absolute; top: 6px; right: 8px; width: 6px; height: 6px; border-radius: 50%; background: #C6A0F6; box-shadow: 0 0 6px rgba(198,160,246,0.8); }

/* mobil: bejegyzés kártyák */
.entrylist { display: flex; flex-direction: column; gap: 10px; animation: fadeUp .3s ease; }
.entrycard { display: flex; align-items: center; gap: 13px; padding: 14px 16px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.06); background: rgba(30,32,48,0.75); text-align: left; color: #E9EBF8; backdrop-filter: blur(4px); width: 100%; min-height: 64px; }
.entrycard.hasimg { flex-direction: column; align-items: stretch; gap: 0; padding: 0; background: rgba(24,26,40,0.85); overflow: hidden; }
.ecbanner { width: 100%; aspect-ratio: 460 / 215; object-fit: cover; display: block; }
.ecrow { display: flex; align-items: center; gap: 13px; width: 100%; }
.entrycard.hasimg .ecrow { padding: 11px 16px 13px; }
.entrycard:hover { border-color: rgba(255,255,255,0.16); transform: translateY(-1px); box-shadow: 0 6px 18px rgba(0,0,0,0.25); }
.entrycard.nowcard { box-shadow: inset 3px 0 0 #C6A0F6, 0 0 20px rgba(198,160,246,0.08); }
.ecmain { flex: 1; min-width: 0; }
.ectime { font-size: 12px; font-weight: 800; opacity: 0.75; font-variant-numeric: tabular-nums; }
.ecname { font-weight: 800; font-size: 16px; display: block; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ecnote { font-size: 12px; opacity: 0.55; display: block; margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ecdur { font-size: 12px; font-weight: 800; border: 1px solid; border-radius: 999px; padding: 3px 10px; flex-shrink: 0; white-space: nowrap; }
.emptyday { text-align: center; padding: 40px 20px; opacity: 0.45; font-size: 14px; }
.emptyday .bigcat { font-size: 40px; display: block; margin-bottom: 8px; }

.fab { position: fixed; right: 20px; bottom: 20px; width: 58px; height: 58px; border-radius: 20px; border: none; background: linear-gradient(135deg, #C6A0F6, #B18AF0); color: #14151f; font-size: 28px; font-weight: 800; box-shadow: 0 8px 26px rgba(198,160,246,0.45); z-index: 40; }
.fab:hover { transform: translateY(-2px) scale(1.04); }
.sleepycat { text-align: center; margin-top: 20px; font-size: 24px; opacity: 0.45; }
.sleepycat span { font-size: 12px; opacity: 0.7; font-style: italic; }

/* desktop: idővonal rács */
.weekgrid { display: none; }
.statwrap { display: flex; flex-direction: column; gap: 20px; }

.card { background: rgba(30,32,48,0.75); border: 1px solid rgba(255,255,255,0.07); border-radius: 20px; padding: 22px; backdrop-filter: blur(6px); box-shadow: 0 8px 30px rgba(0,0,0,0.2); animation: fadeUp .3s ease; }
.cardtitle { margin: 0 0 16px; font-size: 15px; font-weight: 900; opacity: 0.85; text-transform: uppercase; letter-spacing: 0.8px; }
.bignum { font-size: 34px; font-weight: 800; }
.muted { opacity: 0.5; font-size: 14px; }
.statrow { display: flex; align-items: center; gap: 12px; margin-bottom: 11px; }
.statname { width: 110px; font-size: 14px; font-weight: 700; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bar { flex: 1; height: 11px; background: rgba(255,255,255,0.06); border-radius: 999px; overflow: hidden; }
.barfill { height: 100%; border-radius: 999px; transition: width .5s cubic-bezier(.22,1,.36,1); box-shadow: 0 0 10px rgba(198,160,246,0.25); }
.stathours { width: 52px; text-align: right; font-size: 13px; font-weight: 800; font-variant-numeric: tabular-nums; }
.statpct { width: 42px; text-align: right; font-size: 12px; font-weight: 700; opacity: 0.45; font-variant-numeric: tabular-nums; }
.limitbox { margin-top: 20px; padding-top: 18px; border-top: 1px solid rgba(255,255,255,0.07); }

.miniStats { display: flex; gap: 10px; margin-top: 16px; }
.miniStat { flex: 1; background: rgba(20,21,31,0.6); border: 1px solid rgba(255,255,255,0.05); border-radius: 14px; padding: 12px; text-align: center; }
.miniVal { font-size: 20px; font-weight: 900; color: #D5B8FA; }
.miniLbl { font-size: 11px; opacity: 0.55; font-weight: 700; margin-top: 2px; }

.delta { font-size: 12px; font-weight: 800; margin-left: 4px; }
.delta.up { color: #A6DA95; }
.delta.down { color: #ED8796; }
.delta.same { opacity: 0.5; }

.daychart { display: flex; gap: 8px; height: 130px; align-items: flex-end; }
.daycol { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; }
.dayval { font-size: 12px; font-weight: 800; opacity: 0.6; height: 18px; }
.daybarwrap { flex: 1; width: 100%; display: flex; align-items: flex-end; justify-content: center; }
.daybar { width: 70%; max-width: 34px; border-radius: 8px 8px 3px 3px; background: linear-gradient(180deg, rgba(198,160,246,0.85), rgba(198,160,246,0.35)); transition: height .5s cubic-bezier(.22,1,.36,1); }
.daybar.top { background: linear-gradient(180deg, #C6A0F6, #F5BDE6); box-shadow: 0 0 14px rgba(198,160,246,0.35); }
.daylbl { font-size: 12px; font-weight: 800; opacity: 0.5; margin-top: 6px; }
.daylbl.today { opacity: 1; color: #D5B8FA; }

.overlay { position: fixed; inset: 0; background: rgba(8,8,16,0.6); display: flex; align-items: center; justify-content: center; padding: 16px; z-index: 50; backdrop-filter: blur(6px); animation: overlayIn .2s ease; }
.modal { background: rgba(30,32,48,0.97); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 22px; width: 100%; max-width: 430px; max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 70px rgba(0,0,0,0.5); animation: modalIn .25s cubic-bezier(.22,1,.36,1); }
.modalhead { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; font-size: 15px; }
.lbl { display: block; font-size: 11px; font-weight: 900; opacity: 0.55; margin: 15px 0 7px; text-transform: uppercase; letter-spacing: 0.8px; }
.inp { padding: 12px 14px; border-radius: 13px; border: 1px solid rgba(255,255,255,0.09); background: rgba(20,21,31,0.9); color: #E9EBF8; font-size: 15px; font-family: inherit; width: 100%; transition: border-color .18s, box-shadow .18s; }
.inp:focus { outline: none; border-color: #C6A0F6; box-shadow: 0 0 0 3px rgba(198,160,246,0.15); }
.inp::placeholder { color: #5a5d74; }
.inp.time { width: auto; font-variant-numeric: tabular-nums; color-scheme: dark; }
.timerow { display: flex; gap: 10px; align-items: center; }
.catrow { display: flex; flex-wrap: wrap; gap: 7px; }
.catchip { padding: 8px 14px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.09); background: rgba(20,21,31,0.8); color: #9a9db5; font-size: 13px; font-weight: 800; }
.catchip:hover { border-color: rgba(255,255,255,0.2); }
.modalfoot { display: flex; gap: 10px; margin-top: 22px; }
.spacer { flex: 1; }
.btn { padding: 11px 20px; border-radius: 13px; border: none; font-weight: 800; font-size: 14px; }
.btn.primary { background: linear-gradient(120deg, #C6A0F6, #B18AF0); color: #14151f; box-shadow: 0 4px 16px rgba(198,160,246,0.3); }
.btn.primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(198,160,246,0.4); }
.btn.primary:disabled { opacity: 0.35; cursor: default; box-shadow: none; }
.btn.ghost { background: rgba(20,21,31,0.8); color: #E9EBF8; border: 1px solid rgba(255,255,255,0.09); }
.btn.ghost:hover { border-color: rgba(255,255,255,0.2); }
.btn.danger { background: rgba(237,135,150,0.12); color: #ED8796; border: 1px solid rgba(237,135,150,0.25); }
.btn.danger:hover { background: rgba(237,135,150,0.2); }
.hint { font-size: 12px; margin-top: 5px; }
.hint.warn { color: #EED49F; }
.hint.ok { color: #A6DA95; }
.imgrow { display: flex; gap: 10px; align-items: center; }
.imgprev { width: 96px; height: 45px; border-radius: 12px; object-fit: cover; }

.toast { position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%); background: rgba(42,44,60,0.95); border: 1px solid rgba(255,255,255,0.12); color: #E9EBF8; padding: 11px 20px; border-radius: 15px; font-size: 14px; font-weight: 800; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.4); backdrop-filter: blur(8px); animation: popIn .25s cubic-bezier(.22,1,.36,1); }

.tipcard { position: fixed; z-index: 90; width: 250px; background: rgba(26,28,42,0.97); border: 1px solid rgba(255,255,255,0.12); border-radius: 18px; overflow: hidden; box-shadow: 0 18px 50px rgba(0,0,0,0.55), 0 0 30px rgba(198,160,246,0.08); backdrop-filter: blur(12px); pointer-events: none; opacity: 0; transform: translateY(6px) scale(.97); transition: opacity .18s ease, transform .18s cubic-bezier(.22,1,.36,1); }
.tipcard.show { opacity: 1; transform: none; }
.tipimg { width: 100%; aspect-ratio: 460 / 215; object-fit: cover; display: block; }
.tipbody { padding: 12px 14px 13px; }
.tipname { font-size: 15px; font-weight: 900; margin-bottom: 5px; }
.tiprow { font-size: 12.5px; opacity: 0.85; margin-bottom: 6px; display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
.tipchip { font-size: 11px; font-weight: 800; border: 1px solid; border-radius: 999px; padding: 2px 9px; }
.tipchip.genre { color: #b9bccf; border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); }
.tipnote { font-size: 12px; opacity: 0.7; margin-bottom: 6px; line-height: 1.35; }
.tipgold { font-size: 12px; font-weight: 900; color: #EED49F; }

/* láda + kirakók */
@keyframes revealPop { 0% { opacity: 0; transform: translateY(14px) scale(.7) rotate(-4deg); } 60% { transform: translateY(-3px) scale(1.06) rotate(1deg); } 100% { opacity: 1; transform: none; } }
@keyframes piecePop { 0% { transform: scale(.4) rotate(-8deg); opacity: 0; } 60% { transform: scale(1.12) rotate(2deg); } 100% { transform: none; opacity: 1; } }
@keyframes glowPulse { 0%,100% { box-shadow: 0 0 18px rgba(166,218,149,0.25); } 50% { box-shadow: 0 0 30px rgba(166,218,149,0.5); } }

.chestcard { border-color: rgba(238,212,159,0.25); }
.chestrow { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.chestemoji { font-size: 44px; filter: drop-shadow(0 4px 12px rgba(238,212,159,0.35)); }
.chestbtn { text-align: center; line-height: 1.25; background: linear-gradient(120deg, #EED49F, #F5A97F); box-shadow: 0 4px 18px rgba(238,212,159,0.3); }
.chestbtn:hover:not(:disabled) { box-shadow: 0 6px 26px rgba(238,212,159,0.45); }

.revealrow { display: flex; gap: 12px; margin-top: 18px; flex-wrap: wrap; }
.revealpiece { animation: revealPop .5s cubic-bezier(.22,1,.36,1) both; text-align: center; }
.revealimg { width: 86px; height: 86px; border-radius: 14px; border: 2px solid rgba(238,212,159,0.5); box-shadow: 0 6px 20px rgba(0,0,0,0.4), 0 0 16px rgba(238,212,159,0.25); }
.reveallbl { font-size: 11px; font-weight: 800; opacity: 0.7; margin-top: 6px; max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.pzhead { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
.pzdone { font-size: 12px; color: #A6DA95; margin-left: 6px; }
.puzzlecard.complete { border-color: rgba(166,218,149,0.35); }
.pzboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px; border-radius: 14px; overflow: hidden; max-width: 480px; }
.pzboard.glow { animation: glowPulse 2.5s ease-in-out infinite; }
.pzcell { aspect-ratio: 4 / 3; }
.pzcell.owned { background-repeat: no-repeat; }
.pzcell.owned.pop { animation: piecePop .45s cubic-bezier(.22,1,.36,1); }
.pzcell.locked { background: rgba(20,21,31,0.85); border: 1px dashed rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.15); font-weight: 900; font-size: 18px; border-radius: 4px; }
.pockettitle { font-size: 12px; font-weight: 800; opacity: 0.6; margin: 16px 0 8px; }
.pocketrow { display: flex; gap: 8px; flex-wrap: wrap; }
.pocketpiece { width: 62px; height: 62px; border-radius: 12px; border: 2px solid rgba(238,212,159,0.45); padding: 0; box-shadow: 0 4px 14px rgba(0,0,0,0.35); }
.pocketpiece:hover { transform: translateY(-3px) scale(1.06); border-color: #EED49F; box-shadow: 0 8px 20px rgba(238,212,159,0.3); }

.pznav { display: flex; align-items: center; justify-content: center; gap: 16px; }
.pzarrow { width: 40px; height: 40px; font-size: 20px; border-radius: 13px; }
.pzarrow:disabled { opacity: 0.3; cursor: default; }
.pzcounter { text-align: center; font-size: 13px; font-weight: 800; opacity: 0.75; min-width: 70px; }
.pzdots { display: flex; gap: 5px; justify-content: center; margin-top: 5px; }
.pzdot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.15); transition: all .2s; }
.pzdot.on { background: #C6A0F6; box-shadow: 0 0 8px rgba(198,160,246,0.6); transform: scale(1.25); }
.pzdot.full { background: #A6DA95; }
.pzdot.full.on { box-shadow: 0 0 8px rgba(166,218,149,0.6); }
.puzzlecard { animation: fadeUp .25s ease; }

/* kártya készítés */
.kartyawrap { display: flex; gap: 26px; flex-wrap: wrap; align-items: flex-start; }
.kartyaform { flex: 1 1 320px; min-width: 280px; }
.kartyapreviewcol { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; gap: 8px; position: sticky; top: 16px; }

.ckstatrow { display: flex; align-items: center; gap: 10px; margin: 12px 0; }
.cklbl { width: 118px; flex-shrink: 0; font-size: 13px; font-weight: 800; opacity: 0.85; }
.ckstatrow input[type="range"] { flex: 1; accent-color: #C6A0F6; height: 4px; }
.ckstatval { width: 30px; text-align: right; font-weight: 900; font-variant-numeric: tabular-nums; font-size: 13px; opacity: 0.85; }

.kartyagrid { display: flex; flex-wrap: wrap; align-items: flex-start; gap: 18px; margin-top: 18px; }

.tkartya { position: relative; width: 200px; border-radius: 20px; flex-shrink: 0; animation: fadeUp .25s ease; }
.tkartya.small { width: 138px; border-radius: 16px; }

.tkfoil { position: absolute; inset: -3px; border-radius: 23px;
  background: conic-gradient(from 0deg, #EED49F, #F5A97F, #C6A0F6, #8AADF4, #F5BDE6, #EED49F);
  animation: foilspin 6s linear infinite; filter: saturate(1.15); }
.tkartya.small .tkfoil { inset: -2px; border-radius: 18px; }
@keyframes foilspin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

.tkinner { position: relative; z-index: 1; border-radius: inherit; padding: 12px 12px 13px;
  display: flex; flex-direction: column; gap: 9px; overflow: hidden;
  background: linear-gradient(165deg, #24263c 0%, #1a1b2b 55%, #14151f 100%);
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 16px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06); }
.tkartya.small .tkinner { padding: 9px 9px 10px; gap: 6px; }
.tkartya.limitalt .tkinner {
  background: linear-gradient(165deg, #2c2519 0%, #1c1a1f 55%, #14151f 100%);
  box-shadow: 0 18px 46px rgba(0,0,0,0.55), 0 0 32px rgba(238,212,159,0.22), inset 0 1px 0 rgba(255,255,255,0.07); }

/* csillogó: pörgő holo-fólia keret + villódzó csillagok + fényes átsöprés */
.tkartya.csillogo .tkfoil {

<body>
<div id="app"></div>

<script>
"use strict";

// ---------- konstansok ----------
const DAYS = ["Hétfő", "Kedd", "Szerda", "Csütörtök", "Péntek", "Szombat", "Vasárnap"];
const DAYS_SHORT = ["H", "K", "Sze", "Cs", "P", "Szo", "V"];
const GRID_END = 24 * 60;    // 24:00
const PX_PER_HOUR = 48;
let gridStart = 6 * 60;      // dinamikus: korai bejegyzésnél lejjebb kúszik

const CATS = {
  munka:   { name: "Munka",    color: "#F5A97F", soft: "rgba(245,169,127,0.16)" },
  tanulas: { name: "Tanulás",  color: "#8AADF4", soft: "rgba(138,173,244,0.16)" },
  jatek:   { name: "Játék",    color: "#C6A0F6", soft: "rgba(198,160,246,0.16)" },
  foci:    { name: "Foci",     color: "#8BD5CA", soft: "rgba(139,213,202,0.16)" },
  film:    { name: "Filmezés", color: "#EE99A0", soft: "rgba(238,153,160,0.16)" },
  edzes:   { name: "Edzés",    color: "#A6DA95", soft: "rgba(166,218,149,0.16)" },
  pihenes: { name: "Pihenés",  color: "#F5BDE6", soft: "rgba(245,189,230,0.16)" },
  egyeb:   { name: "Egyéb",    color: "#91D7E3", soft: "rgba(145,215,227,0.16)" },
};

// ---------- állapot ----------
// entries: tömb, elemei { id, day, start, end, name, cat, note, img } - start/end percben (0-1440)
const state = {
  weekOffset: 0,
  entries: [],
  tab: "naptar",
  activeDay: (() => { const d = new Date().getDay(); return d === 0 ? 6 : d - 1; })(),
  gameLimit: null,
  modal: null,
  puzzles: [],
  spent: 0,
  reveal: null,
  justPlaced: null,
  pzIndex: 0,
  cards: [],
  cardDraft: defaultCardDraft(),
  ckBgBusy: false,
  ckCharBusy: false,
};

// ---------- segédek ----------
function isoWeekKey(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  const week = Math.ceil(((d - yearStart) / 86400000 + 1) / 7);
  return d.getUTCFullYear() + "-W" + String(week).padStart(2, "0");
}
function mondayOf(date) {
  const d = new Date(date);
  const day = d.getDay() || 7;
  d.setDate(d.getDate() - day + 1);
  d.setHours(0, 0, 0, 0);
  return d;
}
function curMonday() {
  const m = mondayOf(new Date());
  m.setDate(m.getDate() + state.weekOffset * 7);
  return m;
}
function weekStorageKey() { return "planner:" + isoWeekKey(curMonday()); }
function fmtRange(monday) {
  const sun = new Date(monday); sun.setDate(sun.getDate() + 6);
  const f = (x) => (x.getMonth() + 1) + "." + String(x.getDate()).padStart(2, "0") + ".";
  return monday.getFullYear() + ". " + f(monday) + " – " + f(sun);
}
function fmtTime(mins) {
  return Math.floor(mins / 60) + ":" + String(mins % 60).padStart(2, "0");
}
function toTimeInputVal(mins) {
  return String(Math.floor(mins / 60)).padStart(2, "0") + ":" + String(mins % 60).padStart(2, "0");
}
function parseTimeInput(val) {
  const m = /^(\d{1,2}):(\d{2})$/.exec(val || "");
  if (!m) return null;
  const mins = Number(m[1]) * 60 + Number(m[2]);
  return mins >= 0 && mins < 1440 ? mins : null;
}
function fmtH(hours) {
  const r = Math.round(hours * 10) / 10;
  return (r % 1 === 0 ? String(r) : String(r).replace(".", ",")) ;
}
function newId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

function steamHeaderFromUrl(url) {
  const m = url.match(/store\.steampowered\.com\/app\/(\d+)/);
  return m ? "https://cdn.cloudflare.steamstatic.com/steam/apps/" + m[1] + "/header.jpg" : null;
}
// Steam képvariánsok: álló poszter magas blokkhoz, kapszula alacsonyhoz
function steamVariant(img, kind) {
  if (!img || img.indexOf("steamstatic.com") === -1) return img;
  if (kind === "poster") return img.replace("header.jpg", "library_600x900.jpg");
  if (kind === "capsule") return img.replace("header.jpg", "capsule_231x87.jpg");
  return img;
}
function steamNameFromUrl(url) {
  const m = url.match(/store\.steampowered\.com\/app\/\d+\/([^\/?#]+)/);
  if (!m) return null;
  try {
    return decodeURIComponent(m[1]).replace(/_/g, " ").replace(/\s+/g, " ").trim();
  } catch (e) { return null; }
}
function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
function shrinkImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const MAX = 480;
        let w = img.width, h = img.height;
        const scale = Math.min(1, MAX / Math.max(w, h));
        w = Math.round(w * scale); h = Math.round(h * scale);
        const c = document.createElement("canvas");
        c.width = w; c.height = h;
        c.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL("image/jpeg", 0.72));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ---------- tárolás + migráció ----------
// régi formátum: { "nap-óra": {name,cat,note,img}, ... } -> intervallumokká alakítjuk
function migrateOld(obj) {
  const items = [];
  const seen = {};
  const keys = Object.keys(obj).sort((a, b) => {
    const [ad, ah] = a.split("-").map(Number);
    const [bd, bh] = b.split("-").map(Number);
    return ad - bd || ah - bh;
  });
  keys.forEach((key) => {
    if (seen[key]) return;
    const [day, hour] = key.split("-").map(Number);
    const e = obj[key];
    if (!e || typeof e !== "object") return;
    let end = hour + 1;
    while (end < 24) {
      const nk = day + "-" + end;
      const ne = obj[nk];
      if (ne && ne.name === e.name && ne.cat === e.cat && ne.note === e.note && ne.img === e.img) {
        seen[nk] = true; end++;
      } else break;
    }
    items.push({ id: newId(), day, start: hour * 60, end: end * 60, name: e.name || "", cat: e.cat || "egyeb", note: e.note || "", img: e.img || null });
  });
  return items;
}
function parseWeekValue(raw) {
  if (!raw) return [];
  try {
    const data = JSON.parse(raw);
    if (Array.isArray(data)) return data;
    if (data && data.v === 2 && Array.isArray(data.items)) return data.items;
    if (data && typeof data === "object") return migrateOld(data);
  } catch (e) {}
  return [];
}
function loadWeek() {
  state.entries = parseWeekValue(localStorage.getItem(weekStorageKey()));
}
function saveWeek() {
  try { localStorage.setItem(weekStorageKey(), JSON.stringify({ v: 2, items: state.entries })); }
  catch (e) { showToast("Mentés nem sikerült (betelt a tárhely?) 🙀"); }
}
function loadMeta() {
  try {
    const meta = JSON.parse(localStorage.getItem("planner:meta")) || {};
    state.gameLimit = meta.gameLimit || null;
  } catch (e) { state.gameLimit = null; }
}
function saveMeta() {
  localStorage.setItem("planner:meta", JSON.stringify({ gameLimit: state.gameLimit }));
}

// átfedések rendezése: az új intervallum kiszorítja a régit (vágás/törlés)
function resolveOverlaps(day, start, end, excludeId) {
  const keep = [];
  state.entries.forEach((e) => {
    if (e.day !== day || e.id === excludeId) { keep.push(e); return; }
    if (e.end <= start || e.start >= end) { keep.push(e); return; } // nincs átfedés
    if (e.start < start && e.end > end) {
      // kettévágja: elülső darab marad, hátsó új elemként
      keep.push({ ...e, end: start });
      keep.push({ ...e, id: newId(), start: end });
    } else if (e.start < start) {
      keep.push({ ...e, end: start });
    } else if (e.end > end) {
      keep.push({ ...e, start: end });
    }
    // teljesen lefedett: kiesik
  });
  state.entries = keep.filter(e => e.end - e.start >= 5); // 5 percnél rövidebb csonkokat eldobjuk
}

// ---------- arany 🪙 ----------
const GOLD_RATES = { jatek: 10, tanulas: 20, munka: 15, edzes: 20, foci: 15, film: 7, pihenes: 5, egyeb: 8 }; // arany / óra
function goldOf(items) {
  let g = 0;
  items.forEach((e) => {
    g += ((e.end - e.start) / 60) * (GOLD_RATES[e.cat] || 5);
  });
  return Math.round(g);
}
function totalGold() {
  let g = 0;
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key && /^planner:\d{4}-W\d{2}$/.test(key)) {
      g += goldOf(parseWeekValue(localStorage.getItem(key)));
    }
  }
  return g;
}

// ---------- steam műfaj lekérés (cache-elve) ----------
function steamAppId(img) {
  const m = (img || "").match(/steamstatic\.com\/steam\/apps\/(\d+)\//);
  return m ? m[1] : null;
}
function genreCache() {
  try { return JSON.parse(localStorage.getItem("planner:genres")) || {}; }
  catch (e) { return {}; }
}
function saveGenreCache(c) {
  try { localStorage.setItem("planner:genres", JSON.stringify(c)); } catch (e) {}
}
async function fetchGenre(appid) {
  const cache = genreCache();
  if (cache[appid]) return cache[appid]; // üres ("") régi cache-t újrapróbáljuk
  const api = "https://store.steampowered.com/api/appdetails?appids=" + appid + "&l=hungarian&cc=hu";
  const attempts = [
    "https://api.allorigins.win/raw?url=" + encodeURIComponent(api),
    "https://corsproxy.io/?url=" + encodeURIComponent(api),
    api
  ];
  for (const url of attempts) {
    try {
      const ctrl = new AbortController();
      const to = setTimeout(() => ctrl.abort(), 6000);
      const res = await fetch(url, { signal: ctrl.signal });
      clearTimeout(to);
      if (!res.ok) continue;
      const json = await res.json();
      const entry = json && json[appid];
      if (!entry || entry.success === false || !entry.data) continue; // rossz válasz, próbáljuk a következőt
      const genres = entry.data.genres ? entry.data.genres.map(g => g.description).slice(0, 3).join(", ") : "";
      if (!genres) continue; // üreset nem cache-elünk, hátha másik forrás jobbat ad
      cache[appid] = genres;
      saveGenreCache(cache);
      return genres;
    } catch (e) { /* következő próbálkozás */ }
  }
  return null; // nem sikerült, nem cache-eljük, később újrapróbálja
}

// meglévő steames bejegyzések műfajának pótlása visszamenőleg (minden mentett hétre)
async function backfillGenres() {
  const weekKeys = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (/^planner:\d{4}-W\d{2}$/.test(k)) weekKeys.push(k);
  }
  // hiányzó appid-k összegyűjtése
  const missing = new Set();
  weekKeys.forEach((k) => {
    parseWeekValue(localStorage.getItem(k)).forEach((e) => {
      const id = steamAppId(e.img);
      if (id && !e.genre) missing.add(id);
    });
  });
  if (!missing.size) return;
  for (const id of missing) await fetchGenre(id); // cache-be kerül
  // bejegyzések frissítése a cache alapján
  const cache = genreCache();
  let changed = 0;
  weekKeys.forEach((k) => {
    const items = parseWeekValue(localStorage.getItem(k));
    let dirty = false;
    items.forEach((e) => {
      const id = steamAppId(e.img);
      if (id && !e.genre && cache[id]) { e.genre = cache[id]; dirty = true; changed++; }
    });
    if (dirty) {
      try { localStorage.setItem(k, JSON.stringify({ v: 2, items })); } catch (err) {}
    }
  });
  if (!changed) return;
  // az éppen betöltött hét state-jét is frissítjük (id nélkül, kép alapján)
  state.entries.forEach((e) => {
    const id = steamAppId(e.img);
    if (id && !e.genre && cache[id]) e.genre = cache[id];
  });
  render();
  showToast("Műfaj pótolva " + changed + " bejegyzéshez 🎮");
}

// ---------- ládák és kirakók 🎁 ----------
const CHEST_COST = 50;
const CHEST_PIECES = 2;
const PUZZLE_COLS = 4, PUZZLE_ROWS = 3; // 12 darab

function loadPuzzles() {
  try {
    const d = JSON.parse(localStorage.getItem("planner:puzzles")) || {};
    state.spent = d.spent || 0;
    state.puzzles = Array.isArray(d.puzzles) ? d.puzzles : [];
  } catch (e) { state.spent = 0; state.puzzles = []; }
}
function savePuzzles() {
  try {
    localStorage.setItem("planner:puzzles", JSON.stringify({ spent: state.spent, puzzles: state.puzzles }));
  } catch (e) { showToast("Mentés nem sikerült (betelt a tárhely?) 🙀"); }
}
function goldBalance() { return totalGold() - state.spent; }

// monoton növekvő időbélyeg - két gyors esemény se lehessen "döntetlen"
let lastTouch = 0;
function nextTouch() {
  lastTouch = Math.max(Date.now(), lastTouch + 1);
  return lastTouch;
}

// rendezés: amelyikhez van már darab, előrébb; azon belül a legfrissebben bővült legelöl
function sortedPuzzles() {
  return state.puzzles.slice().sort((a, b) => {
    const ah = (a.owned.length + a.pocket.length) > 0 ? 1 : 0;
    const bh = (b.owned.length + b.pocket.length) > 0 ? 1 : 0;
    if (ah !== bh) return bh - ah;
    return (b.touch || 0) - (a.touch || 0);
  });
}

function missingPieces() {
  // [{pid, idx}] az összes még meg nem szerzett darab
  const out = [];
  state.puzzles.forEach((p) => {
    const have = new Set([...p.owned, ...p.pocket]);
    for (let i = 0; i < PUZZLE_COLS * PUZZLE_ROWS; i++) {
      if (!have.has(i)) out.push({ pid: p.id, idx: i });
    }
  });
  return out;
}
function openChest() {
  if (!state.puzzles.length) { showToast("Előbb tölts fel egy képet! 🐈"); return; }
  const missing = missingPieces();
  if (!missing.length) { showToast("Minden kirakód kész, nincs mit húzni! 😸"); return; }
  if (goldBalance() < CHEST_COST) { showToast("Nincs elég aranyad. 🙀 Csinálj valami hasznosat!"); return; }
  state.spent += CHEST_COST;
  const won = [];
  for (let i = 0; i < CHEST_PIECES && missing.length; i++) {
    const pick = missing.splice(Math.floor(Math.random() * missing.length), 1)[0];
    const p = state.puzzles.find(x => x.id === pick.pid);
    p.pocket.push(pick.idx);
    p.touch = nextTouch();
    won.push(pick);
  }
  state.reveal = won;
  state.pzIndex = 0; // a frissen bővült kirakó kerüljön előre
  savePuzzles();
  render();
}
function placePiece(pid, idx) {
  const p = state.puzzles.find(x => x.id === pid);
  if (!p) return;
  const at = p.pocket.indexOf(idx);
  if (at === -1) return;
  p.pocket.splice(at, 1);
  p.owned.push(idx);
  p.touch = nextTouch();
  state.justPlaced = pid + "-" + idx;
  savePuzzles();
  if (p.owned.length === PUZZLE_COLS * PUZZLE_ROWS) showToast("Kirakó kész! 🎉😺");
  render();
}
// darab kivágott képrészletének stílusa
function pieceStyle(img, idx) {
  const c = idx % PUZZLE_COLS, r = Math.floor(idx / PUZZLE_COLS);
  const px = PUZZLE_COLS > 1 ? (c / (PUZZLE_COLS - 1)) * 100 : 0;
  const py = PUZZLE_ROWS > 1 ? (r / (PUZZLE_ROWS - 1)) * 100 : 0;
  return "background-image:url('" + esc(img) + "');background-size:" + (PUZZLE_COLS * 100) + "% " + (PUZZLE_ROWS * 100) + "%;background-position:" + px + "% " + py + "%;";
}

// ---------- statisztika (órákban, tört értékkel) ----------
function computeStats() {
  const perCat = {}, games = {}, gameGenres = {}, perDay = [0, 0, 0, 0, 0, 0, 0];
  state.entries.forEach((e) => {
    const h = (e.end - e.start) / 60;
    perCat[e.cat] = (perCat[e.cat] || 0) + h;
    if (e.day >= 0 && e.day < 7) perDay[e.day] += h;
    if (e.cat === "jatek" && e.name) {
      const n = e.name.trim();
      games[n] = (games[n] || 0) + h;
      if (e.genre && !gameGenres[n]) gameGenres[n] = e.genre;
    }
  });
  const total = Object.values(perCat).reduce((a, b) => a + b, 0);
  return { perCat, games, gameGenres, perDay, total, gameTotal: perCat.jatek || 0 };
}
function prevWeekStats() {
  const prev = new Date(curMonday()); prev.setDate(prev.getDate() - 7);
  const items = parseWeekValue(localStorage.getItem("planner:" + isoWeekKey(prev)));
  let total = 0, gameTotal = 0;
  items.forEach((e) => {
    const h = (e.end - e.start) / 60;
    total += h;
    if (e.cat === "jatek") gameTotal += h;
  });
  return { total, gameTotal, exists: items.length > 0 };
}

// egyedi ötszög (pentagon) statdiagram, saját dizájn
let radarUidCounter = 0;
function radarSVG(c, size, rarity) {
  const vals = [c.ero, c.gyorsasag, c.esz, c.vedekezes, c.csabitas];
  const cx = size / 2, cy = size / 2, maxR = size / 2 - size * 0.16;
  let stroke = "#C6A0F6", fill = "rgba(198,160,246,0.32)", defs = "";
  if (rarity === "limitalt") { stroke = "#EED49F"; fill = "rgba(238,212,159,0.3)"; }
  else if (rarity === "arany") { stroke = "#FFD98C"; fill = "rgba(255,196,102,0.36)"; }
  else if (rarity === "csillogo") {
    radarUidCounter++;
    const uid = "radarholo" + radarUidCounter;
    defs = '<defs><linearGradient id="' + uid + '" x1="0%" y1="0%" x2="100%" y2="100%">' +
      '<stop offset="0%" stop-color="#F5BDE6"/><stop offset="50%" stop-color="#8AADF4"/><stop offset="100%" stop-color="#EED49F"/>' +
      '</linearGradient></defs>';
    stroke = "url(#" + uid + ")";
    fill = "rgba(198,160,246,0.28)";
  }
  const pt = (i, r) => {
    const a = (-90 + i * 72) * Math.PI / 180;
    return [(cx + r * Math.cos(a)).toFixed(1), (cy + r * Math.sin(a)).toFixed(1)];
  };
  let s = '<svg viewBox="0 0 ' + size + ' ' + size + '" width="' + size + '" height="' + size + '">' + defs;
  [0.25, 0.5, 0.75, 1].forEach((f) => {
    const pts = [0, 1, 2, 3, 4].map((i) => pt(i, maxR * f).join(",")).join(" ");
    s += '<polygon points="' + pts + '" fill="none" stroke="rgba(255,255,255,' + (f === 1 ? 0.2 : 0.08) + ')" stroke-width="1"/>';
  });
  for (let i = 0; i < 5; i++) {
    const [x2, y2] = pt(i, maxR);
    s += '<line x1="' + cx + '" y1="' + cy + '" x2="' + x2 + '" y2="' + y2 + '" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>';
  }
  const poly = vals.map((v, i) => pt(i, maxR * Math.max(0, Math.min(100, v)) / 100).join(",")).join(" ");
  s += '<polygon points="' + poly + '" fill="' + fill + '" stroke="' + stroke + '" stroke-width="2" stroke-linejoin="round"/>';
  vals.forEach((v, i) => {
    const [x, y] = pt(i, maxR * Math.max(0, Math.min(100, v)) / 100);
    s += '<circle cx="' + x + '" cy="' + y + '" r="3" fill="' + stroke + '"/>';
  });
  s += "</svg>";
  return s;
}

    html += '<button class="btn primary" data-act="savekartya"' + (draft.name.trim() && draft.game.trim() ? "" : " disabled") + '>Mentés</button>';
    html += '</div>';
    html += '</div>'; // kartyaform

    html += '<div class="kartyapreviewcol"><div class="lbl" style="margin:0">Élő előnézet</div>';
    html += '<div id="ck-preview">' + renderCardHTML(draft, {}) + '</div></div>';
    html += '</div>'; // kartyawrap

    html += '<h2 class="cardtitle" style="margin-top:28px">Mentett kártyáid (' + state.cards.length + ')</h2>';
    if (!state.cards.length) {
      html += '<div class="emptyday" style="display:block"><span class="bigcat">🃏</span>Még nincs egyetlen kártyád sem. Készítsd el az elsőt fent!</div>';
    }
    html += '<div class="kartyagrid">';
    state.cards.forEach((c) => { html += renderCardHTML(c, { actions: true }); });
    html += '</div>';
  }

  // ---- modal ----
  if (state.modal) {
    const m = state.modal, d = m.draft;
    const invalid = d.end <= d.start;
    html += '<div class="overlay" id="overlay"><div class="modal">';
    html += '<div class="modalhead"><strong>' + DAYS[m.day] + '</strong>';
    html += '<button class="navbtn" data-act="closemodal">✕</button></div>';

    html += '<label class="lbl">Nap</label><div class="catrow">';
    DAYS_SHORT.forEach((dn, i) => {
      const on = m.day === i;
      const style = on ? ' style="background:rgba(198,160,246,0.16);border-color:#C6A0F6;color:#C6A0F6"' : '';
      html += '<button class="catchip' + (on ? " on" : "") + '" data-act="mday-' + i + '"' + style + '>' + dn + '</button>';
    });
    html += '</div>';

    html += '<label class="lbl">Mikor?</label>';
    html += '<div class="timerow">';
    html += '<input class="inp time" id="m-start" type="time" value="' + toTimeInputVal(d.start) + '">';
    html += '<span style="opacity:.5">–</span>';
    html += '<input class="inp time" id="m-end" type="time" value="' + toTimeInputVal(d.end) + '">';
    html += '<span style="font-size:13px;opacity:.6;font-weight:700">' + (invalid ? "" : fmtH((d.end - d.start) / 60) + " óra") + '</span>';
    html += '</div>';
    if (invalid) html += '<div class="hint warn">A vége későbbre kell essen, mint a kezdete.</div>';
    html += '<div class="catrow" style="margin-top:8px">';
    [["30p", 30], ["1 ó", 60], ["1,5 ó", 90], ["2 ó", 120], ["3 ó", 180]].forEach(([lbl, mins]) => {
      html += '<button class="catchip" data-act="quickdur-' + mins + '">' + lbl + '</button>';
    });
    html += '</div>';

    html += '<label class="lbl">Mit csinálsz?</label>';
    html += '<input class="inp" id="m-name" placeholder="pl. Donut County" value="' + esc(d.name) + '">';

    html += '<label class="lbl">Kategória</label><div class="catrow">';
    Object.entries(CATS).forEach(([k, c]) => {
      const on = d.cat === k;
      const style = on ? ' style="background:' + c.soft + ';border-color:' + c.color + ';color:' + c.color + '"' : '';
      html += '<button class="catchip' + (on ? " on" : "") + '" data-act="cat-' + k + '"' + style + '>' + c.name + '</button>';
    });
    html += '</div>';

    html += '<label class="lbl">Jegyzet (opcionális)</label>';
    html += '<input class="inp" id="m-note" placeholder="pl. új fejezet" value="' + esc(d.note) + '">';

    html += '<label class="lbl">Steam link (opcionális)</label>';
    html += '<input class="inp" id="m-steam" placeholder="pl. https://store.steampowered.com/app/..." value="' + esc(m.steamLink) + '">';
    if (m.steamErr) html += '<div class="hint warn">Ez nem tűnik Steam bolt linknek – a store.steampowered.com/app/... formátum kell.</div>';
    if (d.img && d.img.indexOf("steamstatic.com") !== -1) {
      html += '<div class="hint ok">Játék kép és név beállítva a Steam linkből 😺' + (d.genre ? ' · <b>' + esc(d.genre) + '</b>' : '') + '</div>';
    }

    html += '<label class="lbl">Kép (opcionális)</label><div class="imgrow">';
    if (d.img) html += '<img src="' + esc(d.img) + '" alt="" class="imgprev" onerror="this.style.display=\'none\'">';
    html += '<button class="btn ghost" data-act="pickimg">' + (m.busy ? "Betöltés…" : d.img ? "Csere" : "Kép feltöltése") + '</button>';
    if (d.img) html += '<button class="btn ghost" data-act="delimg">Törlés</button>';
    html += '<input type="file" id="m-file" accept="image/*" style="display:none">';
    html += '</div>';

    html += '<div class="modalfoot">';
    if (m.id) html += '<button class="btn danger" data-act="delentry">Törlés</button>';
    html += '<div class="spacer"></div>';
    html += '<button class="btn primary" data-act="savemodal"' + (d.name.trim() && !invalid ? "" : " disabled") + '>Mentés</button>';
    html += '</div></div></div>';
  }

  app.innerHTML = html;
  bindEvents();
}

// ---------- eseménykezelés ----------
function bindEvents() {
  hideTip();
  document.querySelectorAll("[data-act]").forEach((el) => {
    el.onclick = (ev) => {
      ev.stopPropagation();
      hideTip();
      handleAction(el.getAttribute("data-act"));
    };
  });

  // hover tooltip a naptár blokkokra (csak egérrel)
  if (window.matchMedia("(hover: hover)").matches) {
    document.querySelectorAll("[data-tip]").forEach((el) => {
      el.onmouseenter = () => {
        const entry = state.entries.find(x => x.id === el.getAttribute("data-tip"));
        if (entry) showTip(entry, el.getBoundingClientRect());
      };
      el.onmouseleave = hideTip;
    });
  }

  // üres helyre kattintás a nap oszlopban -> új bejegyzés arra az órára
  document.querySelectorAll("[data-daycol]").forEach((col) => {
    col.onclick = (ev) => {
      if (ev.target !== col) return; // csak az üres részen
      const rect = col.getBoundingClientRect();
      const y = ev.clientY - rect.top;
      const mins = gridStart + Math.floor(y / PX_PER_HOUR) * 60;
      openModal(null, Number(col.getAttribute("data-daycol")), mins);
    };
  });

  const imp = document.getElementById("importfile");
  if (imp) imp.onchange = importFile;

  const pzfile = document.getElementById("pz-file");
  if (pzfile) pzfile.onchange = async (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    try {
      const img = await shrinkImage(f);
      const name = (f.name || "Kirakó").replace(/\.[^.]+$/, "").replace(/[_-]+/g, " ").trim() || "Kirakó";
      const np = { id: newId(), name, img, owned: [], pocket: [], touch: nextTouch() };
      state.puzzles.push(np);
      state.pzIndex = Math.max(0, sortedPuzzles().findIndex(x => x.id === np.id));
      savePuzzles();
      render();
      showToast('"' + name + '" kirakó hozzáadva! Nyiss ládát a darabokért 🎁');
    } catch (err) { alert("Nem sikerült beolvasni a képet."); }
    e.target.value = "";
  };

  const mfile = document.getElementById("m-file");
  if (mfile) mfile.onchange = async (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f || !state.modal) return;
    state.modal.busy = true; render();
    try { state.modal.draft.img = await shrinkImage(f); }
    catch (err) { alert("Nem sikerült beolvasni a képet."); }
    state.modal.busy = false; render();
  };

  const overlay = document.getElementById("overlay");
  if (overlay) overlay.onclick = (e) => { if (e.target === overlay) closeModal(); };

  const ckName = document.getElementById("ck-name");
  if (ckName) ckName.oninput = () => { state.cardDraft.name = ckName.value; refreshCardPreview(); syncCardSaveBtn(); };
  const ckGame = document.getElementById("ck-game");
  if (ckGame) ckGame.oninput = () => { state.cardDraft.game = ckGame.value; refreshCardPreview(); syncCardSaveBtn(); };
  ["ero", "gyorsasag", "esz", "vedekezes", "csabitas"].forEach((key) => {
    const el = document.getElementById("ck-" + key);
    if (el) el.oninput = () => {
      state.cardDraft[key] = Number(el.value);
      const val = document.getElementById("ck-" + key + "-val");
      if (val) val.textContent = el.value;
      refreshCardPreview();
    };
  });
  const ckBgUrl = document.getElementById("ck-bgurl");
  if (ckBgUrl) ckBgUrl.oninput = () => { state.cardDraft.bgImg = ckBgUrl.value.trim(); refreshCardPreview(); };
  const ckBgFile = document.getElementById("ck-bgfile");
  if (ckBgFile) ckBgFile.onchange = async (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    state.ckBgBusy = true; render();
    try { state.cardDraft.bgImg = await shrinkImage(f); }
    catch (err) { alert("Nem sikerült beolvasni a képet."); }
    state.ckBgBusy = false; render();
  };
  const ckCharUrl = document.getElementById("ck-charurl");
  if (ckCharUrl) {
    ckCharUrl.oninput = () => { state.cardDraft.charImg = ckCharUrl.value.trim(); refreshCardPreview(); };
    ckCharUrl.onchange = () => { render(); };
  }
  const ckCharFile = document.getElementById("ck-charfile");
  if (ckCharFile) ckCharFile.onchange = async (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    state.ckCharBusy = true; render();
    try { state.cardDraft.charImg = await shrinkImage(f); }
    catch (err) { alert("Nem sikerült beolvasni a képet."); }
    state.ckCharBusy = false; render();
  };
  const ckCharX = document.getElementById("ck-charx");
  if (ckCharX) ckCharX.oninput = () => {
    state.cardDraft.charX = Number(ckCharX.value);
    const val = document.getElementById("ck-charx-val");
    if (val) val.textContent = ckCharX.value;
    refreshCardPreview();
  };
  const ckCharY = document.getElementById("ck-chary");
  if (ckCharY) ckCharY.oninput = () => {
    state.cardDraft.charY = Number(ckCharY.value);
    const val = document.getElementById("ck-chary-val");
    if (val) val.textContent = ckCharY.value;
    refreshCardPreview();
  };
  const ckCharScale = document.getElementById("ck-charscale");
  if (ckCharScale) ckCharScale.oninput = () => {
    state.cardDraft.charScale = Number(ckCharScale.value);
    const val = document.getElementById("ck-charscale-val");
    if (val) val.textContent = ckCharScale.value;
    refreshCardPreview();
  };


  const nameInp = document.getElementById("m-name");
  if (nameInp) nameInp.oninput = () => {
    state.modal.draft.name = nameInp.value;
    syncSaveBtn();
  };
  const noteInp = document.getElementById("m-note");
  if (noteInp) noteInp.oninput = () => { state.modal.draft.note = noteInp.value; };

  const startInp = document.getElementById("m-start");
  if (startInp) startInp.onchange = () => {
    const v = parseTimeInput(startInp.value);
    if (v != null) {
      const dur = state.modal.draft.end - state.modal.draft.start;
      state.modal.draft.start = v;
      state.modal.draft.end = Math.min(v + Math.max(dur, 5), 1440);
      render();
    }
  };
  const endInp = document.getElementById("m-end");
  if (endInp) endInp.onchange = () => {
    const v = parseTimeInput(endInp.value);
    if (v != null) { state.modal.draft.end = v; render(); }
  };

  const steamInp = document.getElementById("m-steam");
  if (steamInp) steamInp.oninput = () => {
    const val = steamInp.value;
    state.modal.steamLink = val;
    const header = steamHeaderFromUrl(val.trim());
    state.modal.steamErr = !header && val.trim().length > 10;
    if (header) {
      state.modal.draft.img = header;
      state.modal.draft.cat = "jatek";
      const gname = steamNameFromUrl(val.trim());
      if (gname && !state.modal.draft.name.trim()) state.modal.draft.name = gname;
      // műfaj lekérése a Steamről a háttérben
      const appid = steamAppId(header);
      if (appid) {
        state.modal.draft.genre = genreCache()[appid] || "";
        fetchGenre(appid).then((genres) => {
          if (state.modal && steamAppId(state.modal.draft.img) === appid && genres) {
            state.modal.draft.genre = genres;
            render();
          }
        });
      }
      render();
      const s = document.getElementById("m-steam");
      if (s) { s.focus(); s.selectionStart = s.selectionEnd = s.value.length; }
    }
  };
}

function syncSaveBtn() {
  const d = state.modal.draft;
  const btn = document.querySelector('[data-act="savemodal"]');
  if (btn) btn.disabled = !d.name.trim() || d.end <= d.start;
}

function handleAction(act) {
  if (act === "prevweek") { state.weekOffset--; loadWeek(); render(); return; }
  if (act === "nextweek") { state.weekOffset++; loadWeek(); render(); return; }
  if (act === "thisweek") { state.weekOffset = 0; loadWeek(); render(); return; }
  if (act === "tab-naptar") { state.tab = "naptar"; render(); return; }
  if (act === "tab-stat") { state.tab = "stat"; render(); return; }
  if (act === "tab-gyujt") { state.tab = "gyujt"; state.reveal = null; render(); return; }
  if (act === "tab-kartya") { state.tab = "kartya"; render(); return; }
  if (act === "kartya-rarity-sima") { state.cardDraft.rarity = "sima"; render(); return; }
  if (act === "kartya-rarity-limitalt") { state.cardDraft.rarity = "limitalt"; render(); return; }
  if (act === "kartya-rarity-csillogo") { state.cardDraft.rarity = "csillogo"; render(); return; }
  if (act === "kartya-rarity-arany") { state.cardDraft.rarity = "arany"; render(); return; }
  if (act === "newkartya") { state.cardDraft = defaultCardDraft(); render(); return; }
  if (act === "ckpickbg") { const f = document.getElementById("ck-bgfile"); if (f) f.click(); return; }
  if (act === "ckdelbg") { state.cardDraft.bgImg = ""; render(); return; }
  if (act === "ckpickchar") { const f = document.getElementById("ck-charfile"); if (f) f.click(); return; }
  if (act === "ckdelchar") { state.cardDraft.charImg = ""; render(); return; }
  if (act === "savekartya") {
    const d = state.cardDraft;
    if (!d.name.trim() || !d.game.trim()) return;
    if (d.id) {
      const idx = state.cards.findIndex((c) => c.id === d.id);
      if (idx !== -1) state.cards[idx] = { ...d };
    } else {
      state.cards.push({ ...d, id: newId() });
    }
    saveCards();
    showToast(d.id ? "Kártya frissítve! 🃏" : "Kártya elmentve! 🃏");
    state.cardDraft = defaultCardDraft();
    render();
    return;
  }
  if (act.indexOf("editkartya-") === 0) {
    const c = state.cards.find((x) => x.id === act.slice("editkartya-".length));
    if (c) state.cardDraft = { ...c };
    render();
    return;
  }
  if (act.indexOf("delkartya-") === 0) {
    const id = act.slice("delkartya-".length);
    state.cards = state.cards.filter((x) => x.id !== id);
    saveCards();
    if (state.cardDraft.id === id) state.cardDraft = defaultCardDraft();
    render();
    showToast("Kártya törölve.");
    return;
  }
  if (act === "openchest") { openChest(); return; }
  if (act === "pzprev") {
    const n = state.puzzles.length;
    if (n) state.pzIndex = (state.pzIndex - 1 + n) % n;
    render(); return;
  }
  if (act === "pznext") {
    const n = state.puzzles.length;
    if (n) state.pzIndex = (state.pzIndex + 1) % n;
    render(); return;
  }
  if (act === "addpuzzle") { document.getElementById("pz-file").click(); return; }
  if (act.indexOf("delpuzzle-") === 0) {
    const pid = act.slice(10);
    const p = state.puzzles.find(x => x.id === pid);
    if (p && confirm('Biztos törlöd a(z) "' + p.name + '" kirakót? A megszerzett darabok elvesznek.')) {
      state.puzzles = state.puzzles.filter(x => x.id !== pid);
      savePuzzles(); render();
    }
    return;
  }
  if (act.indexOf("place-") === 0) {
    const rest = act.slice(6);
    const sep = rest.lastIndexOf("-");
    placePiece(rest.slice(0, sep), Number(rest.slice(sep + 1)));
    return;
  }
  if (act === "copyprev") { copyPrevWeek(); return; }
  if (act === "export") { exportAll(); return; }
  if (act === "import") { document.getElementById("importfile").click(); return; }
  if (act === "closemodal") { closeModal(); return; }
  if (act === "savemodal") { saveModal(); return; }
  if (act === "delentry") { deleteEntry(); return; }
  if (act === "pickimg") { document.getElementById("m-file").click(); return; }
  if (act === "delimg") { state.modal.draft.img = null; render(); return; }
  if (act === "add") {
    const now = new Date();
    const start = state.weekOffset === 0 ? Math.min(now.getHours() * 60, 23 * 60) : 8 * 60;
    openModal(null, state.activeDay, start);
    return;
  }
  if (act === "setlimit") {
    const v = document.getElementById("limitinp").value;
    state.gameLimit = v ? Number(v) : null;
    saveMeta(); render(); return;
  }
  if (act === "clearlimit") { state.gameLimit = null; saveMeta(); render(); return; }
  if (act.indexOf("day-") === 0) { state.activeDay = Number(act.slice(4)); render(); return; }
  if (act.indexOf("mday-") === 0) { state.modal.day = Number(act.slice(5)); render(); return; }
  if (act.indexOf("cat-") === 0) { state.modal.draft.cat = act.slice(4); render(); return; }
  if (act.indexOf("quickdur-") === 0) {
    const mins = Number(act.slice(9));
    state.modal.draft.end = Math.min(state.modal.draft.start + mins, 1440);
    render(); return;
  }
  if (act.indexOf("edit-") === 0) { openModal(act.slice(5)); return; }
}

// ---------- indulás ----------
loadMeta();
loadPuzzles();
loadWeek();
loadCards();
render();
backfillGenres(); // régi steames bejegyzések műfajának pótlása a háttérben
</script>
</body>
