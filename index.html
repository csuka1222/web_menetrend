    html += '<input type="range" class="statslider" min="1" max="6" id="ck-energy" value="' + draft.energy + '" style="--track-bg:' + statTrackBg(0, (draft.energy / 6) * 100) + '">';
    html += '<span class="ckstatval" id="ck-energy-val">' + draft.energy + '</span></div>';

    html += '<div class="modalfoot">';
    if (draft.id) html += '<button class="btn ghost" data-act="newkartya">Új kártya</button>';
    html += '<div class="spacer"></div>';
    html += '<button class="btn primary" data-act="savekartya"' + (draft.name.trim() && draft.game.trim() ? "" : " disabled") + '>Mentés</button>';
    html += '</div>';
    html += '</div>'; // kartyaform

    html += '<div class="kartyapreviewcol"><div class="lbl" style="margin:0">Élő előnézet</div>';
    html += '<div id="ck-preview">' + renderCardHTML(draft, {}) + '</div></div>';
    html += '</div>'; // kartyawrap

    html += '<h2 class="cardtitle" style="margin-top:28px">Mentett kártyáid (' + state.cards.length + ')</h2>';
    if (!state.cards.length) {
      html += '<div class="emptyday" style="display:block"><span class="bigcat">🃏</span>Még nincs egyetlen kártyád sem. Készítsd el az elsőt fent!</div>';
    } else {
      const CARDS_PER_PAGE = 8;
      const totalPages = Math.max(1, Math.ceil(state.cards.length / CARDS_PER_PAGE));
      if (state.cardPage >= totalPages) state.cardPage = totalPages - 1;
      if (state.cardPage < 0) state.cardPage = 0;
      const pageStart = state.cardPage * CARDS_PER_PAGE;
      const pageCards = state.cards.slice(pageStart, pageStart + CARDS_PER_PAGE);
      html += '<div class="kartyagrid">';
      pageCards.forEach((c) => {
        html += '<div class="kartyaslot" data-act="viewcard-' + c.id + '" title="Kattints a megnyitáshoz">' + renderCardHTML(c, { small: true }) + '</div>';
      });
      html += '</div>';
      if (totalPages > 1) {
        html += '<div class="kartyapager">';
        html += '<button class="btn ghost" data-act="cardpage-prev"' + (state.cardPage === 0 ? " disabled" : "") + '>◀ Előző</button>';
        html += '<span class="pagelbl">' + (state.cardPage + 1) + ' / ' + totalPages + '. oldal</span>';
        html += '<button class="btn ghost" data-act="cardpage-next"' + (state.cardPage >= totalPages - 1 ? " disabled" : "") + '>Következő ▶</button>';
        html += '</div>';
      }
    }
    }
  }

  // ---- modal ----
  if (state.modal) {
    const m = state.modal, d = m.draft;
    const invalid = d.end <= d.start;
    html += '<div class="overlay" id="overlay"><div class="modal">';
    html += '<div class="modalhead"><strong>' + DAYS[m.day] + '</strong>';
    html += '<button class="navbtn" data-act="closemodal">✕</button></div>';

    html += '<label class="lbl">Nap</label><div class="catrow">';
    DAYS_SHORT.forEach((dn, i) => {
      const on = m.day === i;
      const style = on ? ' style="background:rgba(198,160,246,0.16);border-color:#C6A0F6;color:#C6A0F6"' : '';
      html += '<button class="catchip' + (on ? " on" : "") + '" data-act="mday-' + i + '"' + style + '>' + dn + '</button>';
    });
    html += '</div>';

    html += '<label class="lbl">Mikor?</label>';
    html += '<div class="timerow">';
    html += '<input class="inp time" id="m-start" type="time" value="' + toTimeInputVal(d.start) + '">';
    html += '<span style="opacity:.5">–</span>';
    html += '<input class="inp time" id="m-end" type="time" value="' + toTimeInputVal(d.end) + '">';
    html += '<span style="font-size:13px;opacity:.6;font-weight:700">' + (invalid ? "" : fmtH((d.end - d.start) / 60) + " óra") + '</span>';
    html += '</div>';
    if (invalid) html += '<div class="hint warn">A vége későbbre kell essen, mint a kezdete.</div>';
    html += '<div class="catrow" style="margin-top:8px">';
    [["30p", 30], ["1 ó", 60], ["1,5 ó", 90], ["2 ó", 120], ["3 ó", 180]].forEach(([lbl, mins]) => {
      html += '<button class="catchip" data-act="quickdur-' + mins + '">' + lbl + '</button>';
    });
    html += '</div>';

    html += '<label class="lbl">Mit csinálsz?</label>';
    html += '<input class="inp" id="m-name" placeholder="pl. Donut County" value="' + esc(d.name) + '">';

    html += '<label class="lbl">Kategória</label><div class="catrow">';
    Object.entries(CATS).forEach(([k, c]) => {
      const on = d.cat === k;
      const style = on ? ' style="background:' + c.soft + ';border-color:' + c.color + ';color:' + c.color + '"' : '';
      html += '<button class="catchip' + (on ? " on" : "") + '" data-act="cat-' + k + '"' + style + '>' + c.name + '</button>';
    });
    html += '</div>';

    html += '<label class="lbl">Jegyzet (opcionális)</label>';
    html += '<input class="inp" id="m-note" placeholder="pl. új fejezet" value="' + esc(d.note) + '">';

    html += '<label class="lbl">Steam link (opcionális)</label>';
    html += '<input class="inp" id="m-steam" placeholder="pl. https://store.steampowered.com/app/..." value="' + esc(m.steamLink) + '">';
    if (m.steamErr) html += '<div class="hint warn">Ez nem tűnik Steam bolt linknek – a store.steampowered.com/app/... formátum kell.</div>';
    if (d.img && d.img.indexOf("steamstatic.com") !== -1) {
      html += '<div class="hint ok">Játék kép és név beállítva a Steam linkből 😺' + (d.genre ? ' · <b>' + esc(d.genre) + '</b>' : '') + '</div>';
    }

    html += '<label class="lbl">Kép (opcionális)</label><div class="imgrow">';
    if (d.img) html += '<img loading="lazy" decoding="async" src="' + esc(d.img) + '" alt="" class="imgprev" onerror="this.style.display=\'none\'">';
    html += '<button class="btn ghost" data-act="pickimg">' + (m.busy ? "Betöltés…" : d.img ? "Csere" : "Kép feltöltése") + '</button>';
    if (d.img) html += '<button class="btn ghost" data-act="delimg">Törlés</button>';
    html += '<input type="file" id="m-file" accept="image/*" style="display:none">';
    html += '</div>';

    html += '<div class="modalfoot">';
    if (m.id) html += '<button class="btn danger" data-act="delentry">Törlés</button>';
    html += '<div class="spacer"></div>';
    html += '<button class="btn primary" data-act="savemodal"' + (d.name.trim() && !invalid ? "" : " disabled") + '>Mentés</button>';
    html += '</div></div></div>';
  }

  // ---- kártya részletnézet ----
  if (state.cardView) {
    const cv = state.cards.find((x) => x.id === state.cardView);
    if (cv) {
      html += '<div class="overlay" id="cardviewoverlay">';
      html += '<div class="cardviewbox">';
      html += '<button class="navbtn" data-act="closecardview" style="position:absolute;top:-14px;right:-14px;z-index:10;background:#1e2030">✕</button>';
      html += renderCardHTML(cv, {});
      html += '<div class="modalfoot" style="margin-top:16px">';
      html += '<button class="btn ghost" data-act="editkartya-' + cv.id + '">Szerkesztés</button>';
      html += '<div class="spacer"></div>';
      html += '<button class="btn danger" data-act="delkartya-' + cv.id + '">Törlés</button>';
      html += '</div>';
      html += '</div></div>';
    }
  }

  app.innerHTML = html;
  bindEvents();
  const ckPreviewEl = document.getElementById("ck-preview");
  if (ckPreviewEl) attachCollabDrag(ckPreviewEl);
}

// ---------- eseménykezelés ----------
function bindEvents() {
  hideTip();
  document.querySelectorAll("[data-act]").forEach((el) => {
    el.onclick = (ev) => {
      ev.stopPropagation();
      hideTip();
      handleAction(el.getAttribute("data-act"));
    };
  });

  document.onclick = () => {
    if (!state.cloudPanel) return;
    state.cloudPanel = false;
    render();
  };

  // hover tooltip a naptár blokkokra (csak egérrel)
  if (window.matchMedia("(hover: hover)").matches) {
    document.querySelectorAll("[data-tip]").forEach((el) => {
      el.onmouseenter = () => {
        const entry = state.entries.find(x => x.id === el.getAttribute("data-tip"));
        if (entry) showTip(entry, el.getBoundingClientRect());
      };
      el.onmouseleave = hideTip;
    });
  }

  // Aréna: rálebegéskor a helyszínre rakott mini kártya nagyban, középen felvillan (csak egérrel)
  if (window.matchMedia("(hover: hover)").matches) {
    document.querySelectorAll(".ar2mini[data-cardid]").forEach((el) => {
      el.onmouseenter = () => showArenaCardPeek(ar2CardById(el.getAttribute("data-cardid")));
      el.onmouseleave = hideArenaCardPeek;
    });
  }

  // meccsnéző auto-lejátszás: pár másodpercenként magától lépteti a visszajátszást
  if (window.__tourAutoTimer) { clearTimeout(window.__tourAutoTimer); window.__tourAutoTimer = null; }
  if (state.tourView && state.tourView.auto && (state.tourView.step || 1) <= AR2_ROUNDS) {
    const tv = state.tourView;
    window.__tourAutoTimer = setTimeout(() => {
      if (state.tourView !== tv || !tv.auto) return;
      tv.step = Math.min(AR2_ROUNDS + 1, (tv.step || 1) + 1);
      render();
    }, 2400);
  }

  // üres helyre kattintás a nap oszlopban -> új bejegyzés arra az órára
  document.querySelectorAll("[data-daycol]").forEach((col) => {
    col.onclick = (ev) => {
      if (ev.target !== col) return; // csak az üres részen
      const rect = col.getBoundingClientRect();
      const y = ev.clientY - rect.top;
      const mins = gridStart + Math.floor(y / PX_PER_HOUR) * 60;
      openModal(null, Number(col.getAttribute("data-daycol")), mins);
    };
  });

  const imp = document.getElementById("importfile");
  if (imp) imp.onchange = importFile;

  const pzfile = document.getElementById("pz-file");
  if (pzfile) pzfile.onchange = async (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    try {
      const img = await shrinkImage(f);
      const name = (f.name || "Kirakó").replace(/\.[^.]+$/, "").replace(/[_-]+/g, " ").trim() || "Kirakó";
      const np = { id: newId(), name, img, owned: [], pocket: [], touch: nextTouch() };
      state.puzzles.push(np);
      state.pzIndex = Math.max(0, sortedPuzzles().findIndex(x => x.id === np.id));
      savePuzzles();
      render();
      showToast('"' + name + '" kirakó hozzáadva! Nyiss ládát a darabokért 🎁');
    } catch (err) { alert("Nem sikerült beolvasni a képet."); }
    e.target.value = "";
  };

  const mfile = document.getElementById("m-file");
  if (mfile) mfile.onchange = async (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f || !state.modal) return;
    state.modal.busy = true; render();
    try { state.modal.draft.img = await shrinkImage(f); }
    catch (err) { alert("Nem sikerült beolvasni a képet."); }
    state.modal.busy = false; render();
  };

  const overlay = document.getElementById("overlay");
  if (overlay) overlay.onclick = (e) => { if (e.target === overlay) closeModal(); };
  const cardviewoverlay = document.getElementById("cardviewoverlay");
  if (cardviewoverlay) cardviewoverlay.onclick = (e) => { if (e.target === cardviewoverlay) { state.cardView = null; render(); } };

  const ckName = document.getElementById("ck-name");
  if (ckName) ckName.oninput = () => { state.cardDraft.name = ckName.value; refreshCardPreview(); syncCardSaveBtn(); };
  const ckGame = document.getElementById("ck-game");
  if (ckGame) ckGame.oninput = () => {
    state.cardDraft.game = ckGame.value;
    // ha ehhez a játékhoz korábban már állítottunk be egyéni szöveg-színt, azonnal átvesszük
    const gname = ckGame.value.trim().toLowerCase();
    if (gname) {
      const known = state.cards.find((c) => (c.game || "").trim().toLowerCase() === gname && (c.nameColor || c.gameColor));
      if (known) {
        if (known.nameColor) { state.cardDraft.nameColor = known.nameColor; const nEl = document.getElementById("ck-namecolor"); if (nEl) nEl.value = known.nameColor; }
        if (known.gameColor) { state.cardDraft.gameColor = known.gameColor; const gEl = document.getElementById("ck-gamecolor"); if (gEl) gEl.value = known.gameColor; }
      }
    }
    refreshCardPreview(); syncCardSaveBtn();
  };
  const ckNameColor = document.getElementById("ck-namecolor");
  if (ckNameColor) ckNameColor.oninput = () => { state.cardDraft.nameColor = ckNameColor.value; refreshCardPreview(); };
  const ckGameColor = document.getElementById("ck-gamecolor");
  if (ckGameColor) ckGameColor.oninput = () => { state.cardDraft.gameColor = ckGameColor.value; refreshCardPreview(); };
  ["ero", "gyorsasag", "esz", "vedekezes", "csabitas"].forEach((key) => {
    const el = document.getElementById("ck-" + key);
    if (el) el.oninput = () => {
      const bonus = RARITY_BONUS[state.cardDraft.rarity] || 0;
      const v = Math.max(bonus, Number(el.value));
      el.value = v;
      state.cardDraft[key] = v;
      el.style.setProperty("--track-bg", statTrackBg(bonus, v));
      const val = document.getElementById("ck-" + key + "-val");
      if (val) val.innerHTML = v + (bonus ? '<span class="statbonuslbl">+' + bonus + '</span>' : "");
      refreshCardPreview();
    };
  });
  const ckEnergy = document.getElementById("ck-energy");
  if (ckEnergy) ckEnergy.oninput = () => {
    const v = Math.max(1, Math.min(6, Number(ckEnergy.value)));
    state.cardDraft.energy = v;
    ckEnergy.style.setProperty("--track-bg", statTrackBg(0, (v / 6) * 100));
    const val = document.getElementById("ck-energy-val");
    if (val) val.textContent = v;
  };
  const ckBgUrl = document.getElementById("ck-bgurl");
  if (ckBgUrl) ckBgUrl.oninput = () => { state.cardDraft.bgImg = ckBgUrl.value.trim(); refreshCardPreview(); };
  const ckCornerDesc = document.getElementById("ck-cornerdesc");
  if (ckCornerDesc) ckCornerDesc.oninput = () => { state.cardDraft.cornerDesc = ckCornerDesc.value; refreshCardPreview(); };
  const ckBgFile = document.getElementById("ck-bgfile");
  if (ckBgFile) ckBgFile.onchange = async (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    state.ckBgBusy = true; render();
    try { state.cardDraft.bgImg = await shrinkImage(f); }
    catch (err) { alert("Nem sikerült beolvasni a képet."); }
    state.ckBgBusy = false; render();
  };
  const ckCornerFile = document.getElementById("ck-cornerfile");
  if (ckCornerFile) ckCornerFile.onchange = async (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    state.ckCornerBusy = true; render();
    try { state.cardDraft.cornerImg = await shrinkImageKeepAlpha(f); }
    catch (err) { alert("Nem sikerült beolvasni a képet."); }
    state.ckCornerBusy = false; render();
  };
  const ckCharUrl = document.getElementById("ck-charurl");
  if (ckCharUrl) {
    ckCharUrl.oninput = () => { state.cardDraft.charImg = ckCharUrl.value.trim(); refreshCardPreview(); };
    ckCharUrl.onchange = () => { render(); };
  }
  const ckCharFile = document.getElementById("ck-charfile");
  if (ckCharFile) ckCharFile.onchange = async (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    state.ckCharBusy = true; render();
    try { state.cardDraft.charImg = await shrinkImageKeepAlpha(f); }
    catch (err) { alert("Nem sikerült beolvasni a képet."); }
    state.ckCharBusy = false; render();
  };
  const ckCharX = document.getElementById("ck-charx");
  if (ckCharX) ckCharX.oninput = () => {
    state.cardDraft.charX = Number(ckCharX.value);
    const val = document.getElementById("ck-charx-val");
    if (val) val.textContent = ckCharX.value;
    refreshCardPreview();
  };
  const ckCharY = document.getElementById("ck-chary");
  if (ckCharY) ckCharY.oninput = () => {
    state.cardDraft.charY = Number(ckCharY.value);
    const val = document.getElementById("ck-chary-val");
    if (val) val.textContent = ckCharY.value;
    refreshCardPreview();
  };
  const ckCharScale = document.getElementById("ck-charscale");
  if (ckCharScale) ckCharScale.oninput = () => {
    state.cardDraft.charScale = Number(ckCharScale.value);
    const val = document.getElementById("ck-charscale-val");
    if (val) val.textContent = ckCharScale.value;
    refreshCardPreview();
  };
  const ckCollabAUrl = document.getElementById("ck-collabaurl");
  if (ckCollabAUrl) ckCollabAUrl.oninput = () => { state.cardDraft.collabImgA = ckCollabAUrl.value.trim(); refreshCardPreview(); };
  const ckCollabAFile = document.getElementById("ck-collabafile");
  if (ckCollabAFile) ckCollabAFile.onchange = async (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    state.ckCollabABusy = true; render();
    try { state.cardDraft.collabImgA = await shrinkImage(f); }
    catch (err) { alert("Nem sikerült beolvasni a képet."); }
    state.ckCollabABusy = false; render();
  };
  const ckCollabBUrl = document.getElementById("ck-collabburl");
  if (ckCollabBUrl) ckCollabBUrl.oninput = () => { state.cardDraft.collabImgB = ckCollabBUrl.value.trim(); refreshCardPreview(); };
  const ckCollabBFile = document.getElementById("ck-collabbfile");
  if (ckCollabBFile) ckCollabBFile.onchange = async (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    state.ckCollabBBusy = true; render();
    try { state.cardDraft.collabImgB = await shrinkImage(f); }
    catch (err) { alert("Nem sikerült beolvasni a képet."); }
    state.ckCollabBBusy = false; render();
  };

  // ---- Csüngő-müngő mezők ----
  const charmNameInp = document.getElementById("charm-name");
  if (charmNameInp) charmNameInp.oninput = () => { state.charmDraft.name = charmNameInp.value; syncCharmSaveBtn(); };
  const charmFile = document.getElementById("charm-file");
  if (charmFile) charmFile.onchange = async (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    state.ckCharmBusy = true; render();
    try { state.charmDraft.img = await shrinkImageKeepAlpha(f); }
    catch (err) { alert("Nem sikerült beolvasni a képet."); }
    state.ckCharmBusy = false; render();
  };
  const charmTestCard = document.getElementById("charm-testcard");
  if (charmTestCard) charmTestCard.onchange = () => { state.charmTestCardId = charmTestCard.value; render(); };
  const charmShopCard = document.getElementById("charmshop-card");
  if (charmShopCard) charmShopCard.onchange = () => { state.charmShopCardId = charmShopCard.value; render(); };

  // ---- Aréna: AI ellenfelek neve és avatarja ----
  document.querySelectorAll(".arena-ainame").forEach((el) => {
    el.oninput = () => {
      const idx = Number(el.getAttribute("data-idx"));
      if (state.arenaSetup.ais[idx]) { state.arenaSetup.ais[idx].name = el.value; saveArena(); }
    };
  });
  const tourOppName = document.getElementById("tour-opp-name");
  if (tourOppName) tourOppName.oninput = () => { state.tourOppDraft = state.tourOppDraft || {}; state.tourOppDraft.name = tourOppName.value; };
  const tourOppDiff = document.getElementById("tour-opp-diff");
  if (tourOppDiff) tourOppDiff.onchange = () => { state.tourOppDraft = state.tourOppDraft || {}; state.tourOppDraft.diff = tourOppDiff.value; };
  const tourOppFile = document.getElementById("tour-opp-file");
  if (tourOppFile) tourOppFile.onchange = async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    try {
      const img = await shrinkImageKeepAlpha(file);
      state.tourOppDraft = state.tourOppDraft || {};
      state.tourOppDraft.img = img;
      render();
    } catch (err) { showToast("A kép beolvasása nem sikerült 🙀"); }
    e.target.value = "";
  };
  for (let i = 0; i < ARENA_MAX_AI; i++) {
    const f = document.getElementById("arena-aiavatarfile-" + i);
    if (f) f.onchange = async (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      try {
        const img = await shrinkImageKeepAlpha(file);
        if (!state.arenaSetup.ais[i]) state.arenaSetup.ais[i] = { name: "", avatar: "" };
        state.arenaSetup.ais[i].avatar = img;
        saveArena();
        render();
      } catch (err) { alert("Nem sikerült beolvasni a képet."); }
    };
  }
  // ---- Aréna: helyszín-fotók feltöltése ----
  const arenalocName = document.getElementById("arenaloc-name");
  if (arenalocName) arenalocName.oninput = () => { state.arenaLocDraft.name = arenalocName.value; syncArenaLocAddBtn(); };
  const arenalocFile = document.getElementById("arenaloc-file");
  if (arenalocFile) arenalocFile.onchange = async (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    try { state.arenaLocDraft.img = await shrinkImage(f); render(); }
    catch (err) { alert("Nem sikerült beolvasni a képet."); }
  };

  document.querySelectorAll(".charminst-x").forEach((el) => {
    el.oninput = () => {
      const instId = el.getAttribute("data-instid");
      const card = findCardByCharmInstanceId(instId);
      const inst = card && card.charms.find((x) => x.id === instId);
      if (!inst) return;
      inst.x = Number(el.value);
      saveCards();
      refreshCharmTestPreview();
    };
  });
  document.querySelectorAll(".charminst-scale").forEach((el) => {
    el.oninput = () => {
      const instId = el.getAttribute("data-instid");
      const card = findCardByCharmInstanceId(instId);
      const inst = card && card.charms.find((x) => x.id === instId);
      if (!inst) return;
      inst.scale = Number(el.value);
      saveCards();
      refreshCharmTestPreview();
    };
  });

  const nameInp = document.getElementById("m-name");
  if (nameInp) nameInp.oninput = () => {
    state.modal.draft.name = nameInp.value;
    syncSaveBtn();
  };
  const noteInp = document.getElementById("m-note");
  if (noteInp) noteInp.oninput = () => { state.modal.draft.note = noteInp.value; };

  const startInp = document.getElementById("m-start");
  if (startInp) startInp.onchange = () => {
    const v = parseTimeInput(startInp.value);
    if (v != null) {
      const dur = state.modal.draft.end - state.modal.draft.start;
      state.modal.draft.start = v;
      state.modal.draft.end = Math.min(v + Math.max(dur, 5), 1440);
      render();
    }
  };
  const endInp = document.getElementById("m-end");
  if (endInp) endInp.onchange = () => {
    const v = parseTimeInput(endInp.value);
    if (v != null) { state.modal.draft.end = v; render(); }
  };

  const steamInp = document.getElementById("m-steam");
  if (steamInp) steamInp.oninput = () => {
    const val = steamInp.value;
    state.modal.steamLink = val;
    const header = steamHeaderFromUrl(val.trim());
    state.modal.steamErr = !header && val.trim().length > 10;
    if (header) {
      state.modal.draft.img = header;
      state.modal.draft.cat = "jatek";
      const gname = steamNameFromUrl(val.trim());
      if (gname && !state.modal.draft.name.trim()) state.modal.draft.name = gname;
      // műfaj lekérése a Steamről a háttérben
      const appid = steamAppId(header);
      if (appid) {
        state.modal.draft.genre = genreCache()[appid] || "";
        fetchGenre(appid).then((genres) => {
          if (state.modal && steamAppId(state.modal.draft.img) === appid && genres) {
            state.modal.draft.genre = genres;
            render();
          }
        });
      }
      render();
      const s = document.getElementById("m-steam");
      if (s) { s.focus(); s.selectionStart = s.selectionEnd = s.value.length; }
    }
  };
}

function syncSaveBtn() {
  const d = state.modal.draft;
  const btn = document.querySelector('[data-act="savemodal"]');
  if (btn) btn.disabled = !d.name.trim() || d.end <= d.start;
}

function handleAction(act) {
  if (act === "cloud-toggle") { state.cloudPanel = !state.cloudPanel; render(); return; }
  if (act === "cloud-refresh") {
    showToast("☁️ Frissítés a felhőből...");
    cloud.pullMerge().then((changed) => {
      loadUserData();
      state.cloudPanel = false;
      render();
      showToast(changed ? "☁️ Friss adatok megérkeztek." : "☁️ Minden naprakész.");
    });
    return;
  }
  if (act === "prevweek") { state.weekOffset--; loadWeek(); render(); return; }
  if (act === "nextweek") { state.weekOffset++; loadWeek(); render(); return; }
  if (act === "thisweek") { state.weekOffset = 0; loadWeek(); render(); return; }
  if (act === "tab-naptar") { state.tab = "naptar"; render(); return; }
  if (act === "tab-stat") { state.tab = "stat"; render(); return; }
  if (act === "tab-gyujt") { state.tab = "gyujt"; state.chest = null; render(); return; }
  if (act === "tab-arena") { state.tab = "arena"; render(); return; }
  if (act.indexOf("arena-setstake-") === 0) { state.arenaSetup.stake = Number(act.slice("arena-setstake-".length)); saveArena(); render(); return; }
  if (act.indexOf("arena-setdiff-") === 0) {
    const rest = act.slice("arena-setdiff-".length);
    const sep = rest.indexOf("-");
    const idx = Number(rest.slice(0, sep));
    const diff = rest.slice(sep + 1);
    if (state.arenaSetup.ais[idx]) { state.arenaSetup.ais[idx].difficulty = diff; saveArena(); render(); }
    return;
  }
  if (act.indexOf("arena-pickaiavatar-") === 0) { const f = document.getElementById("arena-aiavatarfile-" + act.slice("arena-pickaiavatar-".length)); if (f) f.click(); return; }
  if (act.indexOf("arena-delaiavatar-") === 0) {
    const idx = Number(act.slice("arena-delaiavatar-".length));
    if (state.arenaSetup.ais[idx]) { state.arenaSetup.ais[idx].avatar = ""; saveArena(); render(); }
    return;
  }
  if (act === "arenaloc-pickimg") { const f = document.getElementById("arenaloc-file"); if (f) f.click(); return; }
  if (act === "arenaloc-add") {
    const d = state.arenaLocDraft;
    if (!d.name.trim() || !d.img) return;
    state.arenaLocations.push({ id: newId(), name: d.name.trim(), img: d.img });
    state.arenaLocDraft = { name: "", img: "" };
    saveArena();
    render();
    showToast("Helyszín hozzáadva! 🏙️");
    return;
  }
  if (act.indexOf("arenaloc-del-") === 0) {
    const id = act.slice("arenaloc-del-".length);
    state.arenaLocations = state.arenaLocations.filter((x) => x.id !== id);
    saveArena();
    render();
    return;
  }
  if (act === "arena-start") {
    if (ownedAlbumCards().length < ARENA_MIN_CARDS) return;
    arenaStartGame();
    render();
    return;
  }
  if (act.indexOf("arena-pickcard-") === 0) { ar2SelectCard(act.slice("arena-pickcard-".length)); return; }
  if (act.indexOf("arena-placelane-") === 0) { ar2PlaceSelected(Number(act.slice("arena-placelane-".length))); return; }
  if (act.indexOf("arena-unstage-") === 0) { ar2Unstage(act.slice("arena-unstage-".length)); return; }
  if (act === "arena-endround") { ar2EndRound(); return; }
  if (act === "arena-nextround") { ar2NextRound(); return; }
  if (act === "arena-double") { ar2YouDouble(); return; }
  if (act === "arena-surrender") { ar2Surrender(); return; }
  if (act === "arena-newmatch") { state.arenaGame = null; render(); return; }
  if (act === "tour-start-16") { tourStart(16); return; }
  if (act === "tour-start-32") { tourStart(32); return; }
  if (act === "tour-opp-pickimg") { const f = document.getElementById("tour-opp-file"); if (f) f.click(); return; }
  if (act === "tour-opp-add") {
    const nameEl = document.getElementById("tour-opp-name");
    const diffEl = document.getElementById("tour-opp-diff");
    const d = state.tourOppDraft || {};
    const name = ((nameEl && nameEl.value) || d.name || "").trim();
    if (!name) { showToast("Adj nevet az ellenfélnek! ✍️"); return; }
    if ((state.tourRoster || []).some((r) => r.name.toLowerCase() === name.toLowerCase() && r.id !== d.id)) { showToast("Ilyen nevű ellenfél már van a keretben! 🙃"); return; }
    if (!state.tourRoster) state.tourRoster = [];
    if (d.id) {
      // meglévő AI-karakter szerkesztése - a neve, képe, nehézsége módosul, a felgyűjtött statisztikái megmaradnak
      const existing = state.tourRoster.find((r) => r.id === d.id);
      if (existing) {
        existing.name = name;
        existing.img = d.img || "";
        existing.diff = (diffEl && diffEl.value) || "normal";
        showToast("✏️ " + name + " frissítve!");
      }
    } else {
      state.tourRoster.push({ id: newId(), name: name, img: d.img || "", diff: (diffEl && diffEl.value) || "normal", stats: { played: 0, titles: 0, seconds: 0, thirds: 0, best: null } });
      showToast("👥 " + name + " bekerült a keretbe!");
    }
    state.tourOppDraft = null;
    saveArena();
    render();
    return;
  }
  if (act.indexOf("tour-opp-edit-") === 0) {
    const oid = act.slice("tour-opp-edit-".length);
    const r = (state.tourRoster || []).find((x) => x.id === oid);
    if (r) state.tourOppDraft = { id: r.id, origName: r.name, name: r.name, img: r.img || "", diff: r.diff || "normal" };
    render();
    return;
  }
  if (act === "tour-opp-canceledit") { state.tourOppDraft = null; render(); return; }
  if (act.indexOf("tour-opp-del-") === 0) {
    const oid = act.slice("tour-opp-del-".length);
    state.tourRoster = (state.tourRoster || []).filter((r) => r.id !== oid);
    if (state.tourOppDraft && state.tourOppDraft.id === oid) state.tourOppDraft = null;
    saveArena();
    render();
    return;
  }
  if (act === "tour-new") { state.tournament = null; state.tourView = null; saveArena(); render(); return; }
  if (act === "tour-abandon") {
    if (window.confirm("Biztosan elveted a folyamatban lévő bajnokságot? Az ágrajz és az eredmények elvesznek.")) {
      state.tournament = null; state.tourView = null; saveArena(); render();
    }
    return;
  }
  if (act === "tour-simall") {
    let guard = 0;
    while (guard++ < 80 && state.tournament && state.tournament.phase === "running") {
      const pend = tourPendingAI();
      if (!pend.length) break;
      pend.forEach((m) => { if (!tourDone(m)) tourSimRecord(m); });
    }
    saveArena(); render(); return;
  }
  if (act.indexOf("tour-sim-") === 0) {
    const m = tourGetMatch(act.slice("tour-sim-".length));
    if (m && !tourDone(m) && m.p1 !== 0 && m.p2 !== 0) { tourSimRecord(m); saveArena(); render(); }
    return;
  }
  if (act.indexOf("tour-watch-") === 0) {
    const ref = act.slice("tour-watch-".length);
    const m = tourGetMatch(ref);
    if (!m) return;
    if (!tourDone(m)) {
      if (m.p1 === 0 || m.p2 === 0) return;
      tourSimRecord(m); saveArena();
    }
    if (!m.log) { showToast("Ezt a meccset élőben játszottad - nincs róla visszajátszás. 🙂"); render(); return; }
    state.tourView = { ref: ref, step: 1 };
    render(); return;
  }
  if (act.indexOf("tour-play-") === 0) { tourPlayMyMatch(act.slice("tour-play-".length)); return; }
  if (act.indexOf("tour-forfeit-") === 0) {
    const m = tourGetMatch(act.slice("tour-forfeit-".length));
    if (m && !tourDone(m) && (m.p1 === 0 || m.p2 === 0) && window.confirm("Feladod ezt a bajnoki meccset? Az ellenfeled továbbjut.")) {
      m.winner = m.p1 === 0 ? m.p2 : m.p1;
      m.forfeit = true;
      tourFeedOnMatch(m);
      tourAdvance(); saveArena(); render();
    }
    return;
  }
  if (act === "tour-vprev") { if (state.tourView) { state.tourView.auto = false; state.tourView.step = Math.max(1, (state.tourView.step || 1) - 1); render(); } return; }
  if (act === "tour-vauto") { if (state.tourView) { state.tourView.auto = !state.tourView.auto; render(); } return; }
  if (act === "tour-feed-toggle") { state.tourFeedAll = !state.tourFeedAll; render(); return; }
  if (act === "tour-vnext") { if (state.tourView) { state.tourView.step = Math.min(AR2_ROUNDS + 1, (state.tourView.step || 1) + 1); render(); } return; }
  if (act === "tour-vend") { if (state.tourView) { state.tourView.step = AR2_ROUNDS + 1; render(); } return; }
  if (act === "tour-vclose") { state.tourView = null; render(); return; }
  if (act === "tab-kartya") { state.tab = "kartya"; render(); return; }
  if (act === "gyujtsub-ladak") { state.gyujtSub = "ladak"; render(); return; }
  if (act === "gyujtsub-album") { state.gyujtSub = "album"; render(); return; }
  if (act === "gyujtsub-bolt") { state.gyujtSub = "bolt"; render(); return; }
  if (act.indexOf("charmattach-") === 0) {
    const charmId = act.slice("charmattach-".length);
    const sCard = state.cards.find((c) => c.id === state.charmShopCardId);
    if (!sCard) return;
    if (!state.charmInv[charmId]) { showToast("Ebből a csüngőből nincs a táskádban - Szerencseládából eshet! 🎁"); return; }
    if (!sCard.charms) sCard.charms = [];
    if (sCard.charms.some((x) => x.charmId === charmId)) return; // már megvan rajta
    state.charmInv[charmId]--;
    if (state.charmInv[charmId] <= 0) delete state.charmInv[charmId];
    sCard.charms.push({ id: newId(), charmId, x: 50, scale: 100, edge: "top", swingSeed: Math.random() * 3 });
    saveCards();
    saveCharms();
    triggerLevelUp(sCard);
    return;
  }
  if (act.indexOf("charmdetach-") === 0) {
    const charmId = act.slice("charmdetach-".length);
    const sCard = state.cards.find((c) => c.id === state.charmShopCardId);
    if (sCard && sCard.charms && sCard.charms.some((x) => x.charmId === charmId)) {
      sCard.charms = sCard.charms.filter((x) => x.charmId !== charmId);
      state.charmInv[charmId] = (state.charmInv[charmId] || 0) + 1; // vissza a táskába
      saveCards();
      saveCharms();
    }
    render();
    return;
  }
  if (act === "kartyasub-keszit") { state.kartyaSub = "keszit"; render(); return; }
  if (act === "kartyasub-csungo") { state.kartyaSub = "csungo"; render(); return; }
  if (act === "charmpickimg") { const f = document.getElementById("charm-file"); if (f) f.click(); return; }
  if (act === "charmdelimg") { state.charmDraft.img = ""; render(); return; }
  if (act === "charmsave") {
    if (!state.charmDraft.name.trim() || !state.charmDraft.img) return;
    state.charms.push({ id: newId(), name: state.charmDraft.name.trim(), img: state.charmDraft.img });
    saveCharms();
    showToast("Csüngő elmentve! 🔑");
    state.charmDraft = { name: "", img: "" };
    render();
    return;
  }
  if (act.indexOf("delcharm-") === 0) {
    const id = act.slice("delcharm-".length);
    state.charms = state.charms.filter((x) => x.id !== id);
    saveCharms();
    // a törölt csüngő minden kártyáról leesik
    let touched = false;
    state.cards.forEach((c) => {
      if (c.charms && c.charms.some((x) => x.charmId === id)) {
        c.charms = c.charms.filter((x) => x.charmId !== id);
        touched = true;
      }
    });
    if (touched) saveCards();
    render();
    showToast("Csüngő törölve.");
    return;
  }
  if (act.indexOf("charmtoggle-") === 0) {
    const charmId = act.slice("charmtoggle-".length);
    const tCard = state.cards.find((c) => c.id === state.charmTestCardId);
    if (!tCard) return;
    if (!tCard.charms) tCard.charms = [];
    const existing = tCard.charms.find((x) => x.charmId === charmId);
    if (existing) {
      tCard.charms = tCard.charms.filter((x) => x.charmId !== charmId);
      saveCards();
      render();
    } else {
      tCard.charms.push({ id: newId(), charmId, x: 50, scale: 100, edge: "top", swingSeed: Math.random() * 3 });
      saveCards();
      triggerLevelUp(tCard);
    }
    return;
  }
  if (act.indexOf("charminstedgetop-") === 0) {
    const instId = act.slice("charminstedgetop-".length);
    const card = findCardByCharmInstanceId(instId);
    const inst = card && card.charms.find((x) => x.id === instId);
    if (inst) { inst.edge = "top"; saveCards(); render(); }
    return;
  }
  if (act.indexOf("charminstedgebottom-") === 0) {
    const instId = act.slice("charminstedgebottom-".length);
    const card = findCardByCharmInstanceId(instId);
    const inst = card && card.charms.find((x) => x.id === instId);
    if (inst) { inst.edge = "bottom"; saveCards(); render(); }
    return;
  }
  if (act.indexOf("charminstdel-") === 0) {
    const instId = act.slice("charminstdel-".length);
    const card = findCardByCharmInstanceId(instId);
    if (card) {
      card.charms = card.charms.filter((x) => x.id !== instId);
      saveCards();
    }
    render();
    return;
  }
  if (act.indexOf("kartya-rarity-") === 0) {
    const r = act.slice("kartya-rarity-".length);
    state.cardDraft.rarity = r;
    const b = RARITY_BONUS[r] || 0;
    const base = Math.max(0, Math.min(100, 50 + b));
    state.cardDraft.ero = base;
    state.cardDraft.gyorsasag = base;
    state.cardDraft.esz = base;
    state.cardDraft.vedekezes = base;
    state.cardDraft.csabitas = base;
    render();
    return;
  }
  if (act === "newkartya") { state.cardDraft = defaultCardDraft(); render(); return; }
  if (act === "ckpickbg") { const f = document.getElementById("ck-bgfile"); if (f) f.click(); return; }
  if (act === "ckdelbg") { state.cardDraft.bgImg = ""; render(); return; }
  if (act === "ckresetnamecolor") { state.cardDraft.nameColor = ""; render(); return; }
  if (act === "ckresetgamecolor") { state.cardDraft.gameColor = ""; render(); return; }
  if (act === "ckpickcorner") { const f = document.getElementById("ck-cornerfile"); if (f) f.click(); return; }
  if (act === "ckdelcorner") { state.cardDraft.cornerImg = ""; render(); return; }
  if (act === "ckpickchar") { const f = document.getElementById("ck-charfile"); if (f) f.click(); return; }
  if (act === "ckdelchar") { state.cardDraft.charImg = ""; render(); return; }
  if (act === "ck-type-normal") { state.cardDraft.isCollab = false; render(); return; }
  if (act === "ck-type-collab") { state.cardDraft.isCollab = true; render(); return; }
  if (act === "ckpickcollaba") { const f = document.getElementById("ck-collabafile"); if (f) f.click(); return; }
  if (act === "ckdelcollaba") { state.cardDraft.collabImgA = ""; render(); return; }
  if (act === "ckpickcollabb") { const f = document.getElementById("ck-collabbfile"); if (f) f.click(); return; }
  if (act === "ckdelcollabb") { state.cardDraft.collabImgB = ""; render(); return; }
  if (act === "cardpage-prev") { state.cardPage = Math.max(0, state.cardPage - 1); render(); return; }
  if (act === "cardpage-next") { state.cardPage++; render(); return; }
  if (act === "savekartya") {
    const d = state.cardDraft;
    if (!d.name.trim() || !d.game.trim()) return;
    if (d.id) {
      const idx = state.cards.findIndex((c) => c.id === d.id);
      if (idx !== -1) state.cards[idx] = { ...d };
    } else {
      state.cards.push({ ...d, id: newId() });
    }
    saveCards();
    showToast(d.id ? "Kártya frissítve! 🃏" : "Kártya elmentve! 🃏");
    state.cardDraft = defaultCardDraft();
    render();
    return;
  }
  if (act.indexOf("editkartya-") === 0) {
    const c = state.cards.find((x) => x.id === act.slice("editkartya-".length));
    if (c) state.cardDraft = { ...c };
    state.cardView = null;
    render();
    return;
  }
  if (act.indexOf("delkartya-") === 0) {
    const id = act.slice("delkartya-".length);
    state.cards = state.cards.filter((x) => x.id !== id);
    saveCards();
    if (state.cardAlbum[id]) { delete state.cardAlbum[id]; saveCardAlbum(); }
    if (state.cardDraft.id === id) state.cardDraft = defaultCardDraft();
    if (state.cardView === id) state.cardView = null;
    render();
    showToast("Kártya törölve.");
    return;
  }
  if (act === "openchest") { openChest(); return; }
  if (act === "chest-open") { if (state.chest && state.chest.stage === "closed") { state.chest.stage = state.chest.loot.length ? "reveal" : "summary"; state.chest.idx = 0; state.chest.flip = false; render(); } return; }
  if (act === "chest-next") {
    const ch = state.chest;
    if (!ch || ch.stage !== "reveal") return;
    const item = ch.loot[ch.idx];
    if (item && item.type === "card" && !ch.flip) { ch.flip = true; render(); return; }
    ch.idx++; ch.flip = false;
    if (ch.idx >= ch.loot.length) ch.stage = "summary";
    render(); return;
  }
  if (act === "chest-close") { state.chest = null; render(); return; }
  if (act === "chest-again") { state.chest = null; openChest(); return; }
  if (act === "albumfilter-mind") { state.albumFilter = "mind"; render(); return; }
  if (act === "albumfilter-megvan") { state.albumFilter = "megvan"; render(); return; }
  if (act === "albumfilter-hianyzik") { state.albumFilter = "hianyzik"; render(); return; }
  if (act === "pzprev") {
    const n = state.puzzles.length;
    if (n) state.pzIndex = (state.pzIndex - 1 + n) % n;
    render(); return;
  }
  if (act === "pznext") {
    const n = state.puzzles.length;
    if (n) state.pzIndex = (state.pzIndex + 1) % n;
    render(); return;
  }
  if (act === "addpuzzle") { document.getElementById("pz-file").click(); return; }
  if (act.indexOf("delpuzzle-") === 0) {
    const pid = act.slice(10);
    const p = state.puzzles.find(x => x.id === pid);
    if (p && confirm('Biztos törlöd a(z) "' + p.name + '" kirakót? A megszerzett darabok elvesznek.')) {
      state.puzzles = state.puzzles.filter(x => x.id !== pid);
      savePuzzles(); render();
    }
    return;
  }
  if (act.indexOf("place-") === 0) {
    const rest = act.slice(6);
    const sep = rest.lastIndexOf("-");
    placePiece(rest.slice(0, sep), Number(rest.slice(sep + 1)));
    return;
  }
  if (act === "copyprev") { copyPrevWeek(); return; }
  if (act === "export") { exportAll(); return; }
  if (act === "import") { document.getElementById("importfile").click(); return; }
  if (act === "closemodal") { closeModal(); return; }
  if (act.indexOf("viewcard-") === 0) { state.cardView = act.slice(9); if (state.albumNew && state.albumNew[state.cardView]) { delete state.albumNew[state.cardView]; saveAlbumNew(); } render(); return; }
  if (act === "closecardview") { state.cardView = null; render(); return; }
  if (act === "savemodal") { saveModal(); return; }
  if (act === "delentry") { deleteEntry(); return; }
  if (act === "pickimg") { document.getElementById("m-file").click(); return; }
  if (act === "delimg") { state.modal.draft.img = null; render(); return; }
  if (act === "add") {
    const now = new Date();
    const start = state.weekOffset === 0 ? Math.min(now.getHours() * 60, 23 * 60) : 8 * 60;
    openModal(null, state.activeDay, start);
    return;
  }
  if (act === "setlimit") {
    const v = document.getElementById("limitinp").value;
    state.gameLimit = v ? Number(v) : null;
    saveMeta(); render(); return;
  }
  if (act === "clearlimit") { state.gameLimit = null; saveMeta(); render(); return; }
  if (act.indexOf("day-") === 0) { state.activeDay = Number(act.slice(4)); render(); return; }
  if (act.indexOf("mday-") === 0) { state.modal.day = Number(act.slice(5)); render(); return; }
  if (act.indexOf("cat-") === 0) { state.modal.draft.cat = act.slice(4); render(); return; }
  if (act.indexOf("quickdur-") === 0) {
    const mins = Number(act.slice(9));
    state.modal.draft.end = Math.min(state.modal.draft.start + mins, 1440);
    render(); return;
  }
  if (act.indexOf("edit-") === 0) { openModal(act.slice(5)); return; }
}

// ---------- indulás ----------
storeInit().then(() => {
  loadUserData();
  render();
  backfillGenres(); // régi steames bejegyzések műfajának pótlása a háttérben
  // felhő-szinkron: induláskor egyszer lekérjük, érkezett-e frissebb adat máshonnan,
  // utána a realtime feliratkozás gondoskodik a további élő frissítésekről
  cloud.pullMerge().then((changed) => {
    if (changed) {
      loadUserData();
      render();
    }
  });
  cloud.subscribeRealtime(() => {
    loadUserData();
    render();
  });
});
</script>
<script>
if ('serviceWorker' in navigator) {
  let updateDetected = false;
  navigator.serviceWorker.register('service-worker.js').then((reg) => {
    // ha MÁR fut worker (tehát ez nem az első telepítés) és talál egy újabbat,
    // az "updatefound" jelzi, hogy frissítés van folyamatban
    reg.addEventListener('updatefound', () => {
      const nw = reg.installing;
      if (!nw || !navigator.serviceWorker.controller) return; // első telepítéskor ne jelezzen
      nw.addEventListener('statechange', () => {
        if (nw.state === 'installed') {
          updateDetected = true;
          showToast('✨ Új verzió érkezett, frissítés...');
        }
      });
    });
  });
  // amint az új worker átveszi az irányítást (és ez tényleg frissítés volt, nem az első
  // telepítés), egyszer újratöltjük az oldalt, hogy a friss fájlok érvénybe lépjenek
  let swRefreshed = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (swRefreshed || !updateDetected) return;
    swRefreshed = true;
    setTimeout(() => window.location.reload(), 1200);
  });
}
</script>
