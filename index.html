// ---------- Aréna 2.0: "Helyszín-háború" - 3 csavaros helyszín, energia, tét, ranglétra ----------
// A régi "legnagyobb stat visz mindent" helyett igazi taktikai csata: 6 körön át lapokat raksz le
// 3 helyszínre, mindegyiknek saját statja ÉS saját csavarja van. Aki a meccs végén több helyszínt
// bír, az nyer. Az energia (körönként nő) dönti el, mennyi lapot engedhetsz meg magadnak - az erős
// lap drága! Közben tétet emelhettek, a győzelem aranyat és ranglétra-pontot ér, a sorozat bónuszt ad.
const ARENA_MIN_CARDS = 5; // ennyi kinyitott kártya kell legalább ahhoz, hogy Arénázni lehessen
const ARENA_MAX_AI = 1; // párbaj egy ellenfél ellen - a mélységet a helyszínek és az energia adja
const ARENA_AI_NAME_POOL = ["Kázmér", "Böbe", "Rozál", "Aladár", "Etelka", "Gyuri", "Marcsa", "Zolti"];
const ARENA_STATS = [
  ["ero", "💪", "Erő"],
  ["gyorsasag", "⚡", "Gyorsaság"],
  ["esz", "🧠", "Ész"],
  ["vedekezes", "🛡️", "Védekezés"],
  ["csabitas", "💋", "Csábítás"],
];
function arenaStatMeta(key) { return ARENA_STATS.find((s) => s[0] === key) || ARENA_STATS[0]; }
// a ténylegesen "élesben" számító statérték - a szintbónuszt (csüngők) is beleszámolja, 100-nál levágva
function effectiveStat(c, key) { return Math.min(100, (c[key] || 0) + cardLevel(c) * LEVEL_STAT_BONUS); }
// a kinyitott (albumban meglévő) kártyák listája - EZEKBŐL áll a Te paklid
function ownedAlbumCards() {
  return state.cards.filter((c) => (state.cardAlbum[c.id] || 0) > 0);
}
// egy kártya "ereje" - az 5 stat átlaga, plusz a ritkaság- és szintbónusz. Ebből számoljuk az energiaköltségét is.
function cardPower(c) {
  return (c.ero + c.gyorsasag + c.esz + c.vedekezes + c.csabitas) / 5 + (RARITY_BONUS[c.rarity] || 0) + cardLevel(c) * LEVEL_STAT_BONUS;
}
function shuffleArr(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
// nehézségi szintek: exp = mennyire erős lapok felé húz az AI paklija, bluff = mekkora eséllyel
// lép szándékosan NEM a matematikailag legjobbat (emberibb, kiszámíthatatlanabb), dbl = mennyire
// bátran emel tétet, ha vezet
const ARENA_DIFFICULTY = {
  konnyu: { label: "Könnyű 😌", exp: -1.2, bluff: 0.5, dbl: 0.1 },
  normal: { label: "Normál 🙂", exp: 0.4, bluff: 0.28, dbl: 0.2 },
  nehez: { label: "Nehéz 😬", exp: 1.6, bluff: 0.12, dbl: 0.32 },
  brutal: { label: "Brutális 💀", exp: 3.0, bluff: 0.04, dbl: 0.45 },
};
const ARENA_DIFFICULTY_ORDER = ["konnyu", "normal", "nehez", "brutal"];
function arenaDifficultyMeta(key) { return ARENA_DIFFICULTY[key] || ARENA_DIFFICULTY.normal; }
// súlyozottan húz "count" darab (ismétlés nélküli) lapot a poolból - exp=0: teljesen véletlen,
// exp>0: az erősebb lapok felé húz, exp<0: a gyengébbek felé (könnyebb AI)
function arenaWeightedDeck(pool, count, exp) {
  if (!pool.length) return [];
  let remaining = pool.slice();
  const picked = [];
  for (let i = 0; i < count; i++) {
    if (!remaining.length) remaining = pool.slice();
    const weights = remaining.map((c) => (exp === 0 ? 1 : Math.pow(Math.max(1, cardPower(c)), exp)));
    const total = weights.reduce((a, b) => a + b, 0);
    let r = Math.random() * total, idx = 0;
    for (; idx < weights.length - 1; idx++) { r -= weights[idx]; if (r <= 0) break; }
    picked.push(remaining.splice(idx, 1)[0]);
  }
  return picked;
}

// Pénzszabály: a befizetett tét(ek) a "paid", a teljes kockázat a "risk" (tétemelésnél nő). Győzelemnél
// a befizetett visszajár ÉS a risk-nyi profit is; vereségnél a risk vész el (AI-emelésnél a különbözetet
// itt vonjuk le); feladásnál CSAK a már befizetett - így az AI emelése elől ki lehet hátrálni.
function ar2Finish(surrendered) {
  const g = state.arenaGame;
  if (!g) return;
  const isGroupMatch = !!(g.tournament && String(g.tournament.ref).charAt(0) === "g");
  const laneWinners = g.lanes.map((l) => ar2LaneWinner(l, g.round));
  const youLanes = laneWinners.reduce((s, w, i) => s + (w === 1 ? ar2LaneWeight(g.lanes[i]) : 0), 0);
  const aiLanes = laneWinners.reduce((s, w, i) => s + (w === -1 ? ar2LaneWeight(g.lanes[i]) : 0), 0);
  let winner;
  if (surrendered) winner = "ai";
  else if (youLanes !== aiLanes) winner = youLanes > aiLanes ? "you" : "ai";
  else if (isGroupMatch) winner = "draw"; // csoportkörben az egyenlő helyszín-állás MINDIG döntetlen
  else {
    // döntetlen helyszín-arány: az összérték dönt (a Fordított világot kihagyva) - ha az is egál, döntetlen
    let ty = 0, ta = 0;
    g.lanes.forEach((l) => { if (l.twist !== "fordi") { ty += ar2LaneTotal(l.you, l, g.round); ta += ar2LaneTotal(l.ai, l, g.round); } });
    winner = ty === ta ? "draw" : (ty > ta ? "you" : "ai");
  }
  let goldDelta = 0;
  if (g.stake > 0) {
    if (surrendered) goldDelta = -g.paid; // a befizetett már le van vonva, több nem vész el
    else if (winner === "you") { state.spent -= (g.paid + g.risk); goldDelta = g.risk; }
    else if (winner === "draw") { state.spent -= g.paid; goldDelta = 0; }
    else { const extra = g.risk - g.paid; if (extra > 0) state.spent += extra; goldDelta = -g.risk; }
  }
  // Aranyláz-bónusz: minden ilyen helyszínért, amit TE nyertél, jár a bónusz - akkor is, ha a meccset elveszted
  let bonusGold = 0;
  if (!surrendered) {
    g.lanes.forEach((l, i) => { if (l.twist === "aranylaz" && laneWinners[i] === 1) bonusGold += AR2_GOLDRUSH_BONUS; });
    if (bonusGold > 0) state.spent -= bonusGold;
  }
  // rangpontok: győzelem +18 (+sorozatbónusz), vereség -12, tétemelt meccsen minden duplán számít
  const mult = g.doubledBy ? 2 : 1;
  const prevStreak = state.arenaStats.streak || 0;
  let ptsDelta = 0;
  if (winner === "you") ptsDelta = (18 + 3 * Math.min(prevStreak, 4)) * mult;
  else if (winner === "ai") ptsDelta = surrendered ? -8 : -12 * mult;
  const prevPts = state.arenaStats.rankPts || 0;
  state.arenaStats.rankPts = Math.max(0, prevPts + ptsDelta);
  if (winner === "you") {
    state.arenaStats.matchesWon++;
    state.arenaStats.streak = prevStreak + 1;
    state.arenaStats.bestStreak = Math.max(state.arenaStats.bestStreak || 0, state.arenaStats.streak);
  } else if (winner === "ai") state.arenaStats.streak = 0;
  if (goldDelta + bonusGold > 0) state.arenaStats.goldEarned = (state.arenaStats.goldEarned || 0) + goldDelta + bonusGold;
  g.result = { laneWinners: laneWinners, youLanes: youLanes, aiLanes: aiLanes, winner: winner, surrendered: !!surrendered, goldDelta: goldDelta, bonusGold: bonusGold, ptsDelta: ptsDelta, prevPts: prevPts, newPts: state.arenaStats.rankPts, streak: state.arenaStats.streak };
  g.phase = "gameover";
  if (g.tournament) tourReportPlayerResult(g, winner);
  saveArena();
  savePuzzles();
  render();
}

function tourGroupTable(gr) {
  const rows = gr.ids.map((id) => ({ id: id, pts: 0, w: 0, d: 0, l: 0, diff: 0 }));
  const R = (id) => rows.find((r) => r.id === id);
  gr.matches.forEach((m) => {
    if (!tourDone(m)) return;
    if (m.draw) {
      R(m.p1).pts += 1; R(m.p2).pts += 1; // döntetlen: 1-1 pont
      R(m.p1).d++; R(m.p2).d++;
    } else {
      R(m.winner).pts += 3; // győzelem: 3 pont
      R(m.winner).w++;
      R(tourLoser(m)).l++;
    }
    if (typeof m.s1 === "number" && typeof m.s2 === "number") {
      R(m.p1).diff += m.s1 - m.s2;
      R(m.p2).diff += m.s2 - m.s1;
    }
  });
  rows.sort((a, b) => b.pts - a.pts || b.diff - a.diff || a.id - b.id);

}

function tourMatchHtml(t, m, r, i) {

    return '<div class="tourmatch"><div class="tourside"><span class="toursidename" style="opacity:.35">?</span></div><div class="tourside"><span class="toursidename" style="opacity:.35">?</span></div></div>';
  }
  const ref = r === "b" ? "b" : r + "-" + i;
  const isGroup = String(r).charAt(0) === "g";
  const actionable = t.phase === "running" && !tourDone(m) &&
    (isGroup ? t.stage === "groups" : (t.stage !== "groups" && (r === "b" || r === t.rounds.length - 1)));
  const youIn = m.p1 === 0 || m.p2 === 0;
  let cls = "tourmatch";
  if (r === "b") cls += " bronzem";
  if (actionable && youIn) cls += " pendyou";
  let h = '<div class="' + cls + '">';
  h += tourSideHtml(m, m.p1, m.s1);
  h += tourSideHtml(m, m.p2, m.s2);
  let btns = "";
  if (actionable) {
    if (youIn) {
      btns += '<button class="tourminibtn play" data-act="tour-play-' + ref + '">⚔️ Lejátszom</button>';
      btns += '<button class="tourminibtn" data-act="tour-forfeit-' + ref + '">🏳️</button>';
    } else {
      btns += '<button class="tourminibtn" data-act="tour-sim-' + ref + '">▶ Gyors</button>';
      btns += '<button class="tourminibtn" data-act="tour-watch-' + ref + '">👀 Megnézem</button>';
    }
  } else if (tourDone(m) && m.log) {
    btns += '<button class="tourminibtn" data-act="tour-watch-' + ref + '">👀 Visszanézés</button>';
  }
  if (m.draw) btns += '<span style="font-size:10.5px;font-weight:900;opacity:.7;align-self:center">🤝 Döntetlen</span>';
  if (btns) h += '<div class="tourmatchbtns">' + btns + '</div>';
  h += '</div>';
  return h;
}
// egy még hivatalosan meg nem nyitott forduló dobozába előre beteszi a már ismert győzteseket
// (a másik oldalon "?" marad, amíg az a párharc is el nem dől)
function tourPreviewMatchHtml(cur, i) {
  const side = (mm) => {
    if (mm && mm.winner != null) {
      const p = tourPlayer(mm.winner);
      const ava = p.avatar ? '<img loading="lazy" decoding="async" class="toursideava" src="' + esc(p.avatar) + '" alt="" onerror="this.style.display=\'none\'">' : (p.isYou ? "🧑" : "🤖");
      return '<div class="tourside win' + (p.isYou ? " you" : "") + '">' + ava + '<span class="toursidename">' + esc(p.name) + '</span></div>';
    }
    return '<div class="tourside"><span class="toursidename" style="opacity:.35">?</span></div>';
  };
  return '<div class="tourmatch tourpreviewmatch">' + side(cur[i * 2]) + side(cur[i * 2 + 1]) + '</div>';
}
// a bronzmeccs doboza is előre feltöltődik az elődöntőből kieső féllel, amint az az elődöntő eldől -
// nem kell megvárni, hogy MINDKÉT elődöntő lezáruljon
function tourBronzePreviewHtml(semis) {
  const side = (m) => {
    if (m && m.winner != null) {
      const p = tourPlayer(tourLoser(m));
      const ava = p.avatar ? '<img loading="lazy" decoding="async" class="toursideava" src="' + esc(p.avatar) + '" alt="" onerror="this.style.display=\'none\'">' : (p.isYou ? "🧑" : "🤖");
      return '<div class="tourside win' + (p.isYou ? " you" : "") + '">' + ava + '<span class="toursidename">' + esc(p.name) + '</span></div>';
    }
    return '<div class="tourside"><span class="toursidename" style="opacity:.35">?</span></div>';
  };
  return '<div class="tourmatch tourpreviewmatch bronzem">' + side(semis[0]) + side(semis[1]) + '</div>';
}
function tourBracketHtml(t) {
  let h = '<div class="tourbracket">';
  for (let r = 0; r < TOUR_ROUND_NAMES.length; r++) {
    const ms = t.rounds[r] || null;
    const count = TOUR_SIZE / Math.pow(2, r + 1);
    h += '<div class="tourcol"><div class="tourcolname">' + TOUR_ROUND_NAMES[r] + '</div><div class="tourcolmatches">';
    for (let i = 0; i < count; i++) {
      if (ms) h += tourMatchHtml(t, ms[i], r, i);
      else if (r > 0 && r === t.rounds.length) h += tourPreviewMatchHtml(t.rounds[r - 1], i);
      else h += tourMatchHtml(t, null, r, i);
    }
    h += '</div></div>';
  }
  h += '</div>';
  if (t.bronze) h += '<div style="max-width:230px;margin:8px auto 0"><div class="tourcolname">Bronzmeccs 🥉</div>' + tourMatchHtml(t, t.bronze, "b", 0) + '</div>';
  else if (t.rounds[2] && t.rounds[2].length === 2 && t.rounds[2].some((m) => tourDone(m))) h += '<div style="max-width:230px;margin:8px auto 0"><div class="tourcolname">Bronzmeccs 🥉</div>' + tourBronzePreviewHtml(t.rounds[2]) + '</div>';
  return h;
}
function tourPodiumHtml(t) {

  const pod = (id, medal, cls, num) => {

}
// az összes lejátszott meccs egy laposra hozott listában (csoportkör + ágrajz + bronzmeccs)
function tourAllMatches(t) {
  const list = [];
  if (t.groups) t.groups.forEach((gr) => gr.matches.forEach((m) => list.push(m)));
  (t.rounds || []).forEach((rs) => rs.forEach((m) => list.push(m)));
  if (t.bronze) list.push(t.bronze);
  return list.filter((m) => tourDone(m));
}
// kártyánként: hányszor húzták elő, és hány olyan meccsben szerepelt, amit a gazdája meg is nyert -
// csak a naplózott (szimulált) meccsekből tudjuk kiolvasni, az élőben játszott sajátjaidból nem marad kártyanapló
function tourCardStats(t) {
  const usage = {};
  const bump = (id, won) => {
    usage[id] = usage[id] || { used: 0, won: 0 };
    usage[id].used++;
    if (won) usage[id].won++;
  };
  tourAllMatches(t).forEach((m) => {
    if (!m.log) return;
    const winSide = m.winner === m.p1 ? "a" : (m.winner === m.p2 ? "b" : null);
    m.log.forEach((entry) => {
      (entry.a || []).forEach((mv) => bump(mv.id, winSide === "a"));
      (entry.b || []).forEach((mv) => bump(mv.id, winSide === "b"));
    });
  });
  return usage;
}
// versenyzőnkénti mérleg (győzelem/vereség/döntetlen, szerzett-kapott pont) az egész tornából
function tourPlayerRecords(t) {
  const rec = {};
  (t.players || []).forEach((p) => { rec[p.id] = { wins: 0, losses: 0, draws: 0, pf: 0, pa: 0, played: 0 }; });
  tourAllMatches(t).forEach((m) => {
    const r1 = rec[m.p1], r2 = rec[m.p2];
    if (!r1 || !r2) return;
    r1.played++; r2.played++;
    if (m.draw) { r1.draws++; r2.draws++; }
    else if (m.winner === m.p1) { r1.wins++; r2.losses++; }
    else { r2.wins++; r1.losses++; }
    if (typeof m.s1 === "number" && typeof m.s2 === "number") { r1.pf += m.s1; r1.pa += m.s2; r2.pf += m.s2; r2.pa += m.s1; }
  });
  return rec;
}
// a torna legrosszabb versenyzője: a legkorábban, legrosszabb helyezéssel kiesett, holtversenynél
// a legrosszabb pontkülönbséggel búcsúzott fél
function tourWorstPlayer(t) {
  const rec = tourPlayerRecords(t);
  let worst = null, worstRank = -1, worstDiff = Infinity, worstPlace = null;
  (t.players || []).forEach((p) => {
    const place = tourPlacementOf(t, p.id);
    const rank = tourPlaceRank(place);
    const r = rec[p.id] || { pf: 0, pa: 0 };
    const diff = r.pf - r.pa;
    if (rank > worstRank || (rank === worstRank && diff < worstDiff)) { worst = p; worstRank = rank; worstDiff = diff; worstPlace = place; }
  });
  if (!worst) return null;
  return { player: worst, place: worstPlace, diff: worstDiff, record: rec[worst.id] };
}
function tourStatCardBlock(label, id, u) {
  let h = '<div class="tourstatblock"><div class="tourstatlabel">' + label + '</div>';
  if (!id) { h += '<div class="muted" style="font-size:12px">nincs adat</div></div>'; return h; }
  const c = ar2CardById(id);
  h += '<div class="tourstatcardrow">' + (c ? ar2MiniHtml(c) : '<div class="ar2mini"></div>');
  h += '<div class="tourstatcardinfo"><b>' + esc(c ? c.name : "Ismeretlen kártya") + '</b><span class="muted" style="font-size:11px">' + u.used + 'x húzva a pályára · ' + u.won + ' megnyert meccsben szerepelt</span></div></div></div>';
  return h;
}
// a torna végén megjelenő statisztika-kártya: legtöbbet/legkevésbé használt lap, legtöbb győzelmet hozó lap, legrosszabb versenyző
function tourStatsHtml(t) {
  const usage = tourCardStats(t);
  const ids = Object.keys(usage);
  let mostUsed = null, leastUsed = null, mostWon = null;
  ids.forEach((id) => {
    if (!mostUsed || usage[id].used > usage[mostUsed].used) mostUsed = id;
    if (!leastUsed || usage[id].used < usage[leastUsed].used) leastUsed = id;
    if (!mostWon || usage[id].won > usage[mostWon].won) mostWon = id;
  });
  const worst = tourWorstPlayer(t);
  let h = '<div class="tourstats">';
  h += '<div class="tourstatshead">📊 Torna-statisztikák</div>';
  if (!ids.length) {
    h += '<div class="muted" style="font-size:12px">A kártyahasználati statisztika csak a szimulált (nem élőben lejátszott) meccsekből számolható, ebből a tornából nincs ilyen napló.</div>';
  } else {
    h += '<div class="tourstatgrid">';
    h += tourStatCardBlock("🔥 Legtöbbet használt kártya", mostUsed, usage[mostUsed]);
    h += tourStatCardBlock("🏆 Legtöbb győzelmet hozó kártya", mostWon, usage[mostWon]);
    h += tourStatCardBlock("🥱 Legkevésbé használt kártya", leastUsed, usage[leastUsed]);
    h += '</div>';
  }
  if (worst && worst.player) {
    const p = worst.player;
    const ava = p.avatar ? '<img loading="lazy" decoding="async" class="toursideava" src="' + esc(p.avatar) + '" alt="">' : (p.isYou ? "🧑" : "🤖");
    const r = worst.record || { wins: 0, losses: 0, draws: 0 };
    h += '<div class="tourstatworst">';
    h += '<div class="tourstatworsttitle">🐌 A bajnokság legrosszabb versenyzője</div>';
    h += '<div class="tourstatworstrow">' + ava + '<b>' + esc(p.name) + '</b><span class="muted" style="font-size:12px">' + tourPlaceLabel(worst.place) + ' · ' + r.wins + 'gy ' + r.losses + 'v' + (r.draws ? ' ' + r.draws + 'd' : '') + ' · pontkülönbség: ' + (worst.diff > 0 ? "+" : "") + worst.diff + '</span></div>';
    h += '</div>';
  }
  h += '</div>';
  return h;
}

// élő állás egy adott visszajátszási lépésnél: hány (már megnyílt) helyszínen áll jobban az egyik-másik fél
function tourViewerScore(m, upto) {
  const lanes = tourViewerLanes(m, upto);
  let a = 0, b = 0;
  lanes.forEach((l, i) => {
    if (upto < i + 1) return;
    const w = ar2LaneWinner(l, upto);
    const wt = ar2LaneWeight(l);
    if (w === 1) a += wt;
    else if (w === -1) b += wt;
  });
  return { a: a, b: b };
}
// kommentátor: determinisztikus, a naplóból számolt "élő" kommentek - fordítás, nagy lap, hajrá
function tourCommentaryHtml(m, shown, pa, pb) {
  const msgs = [];
  const prev = shown > 1 ? tourViewerScore(m, shown - 1) : { a: 0, b: 0 };
  const cur = tourViewerScore(m, shown);
  const entry = m.log[shown - 1];
  if (entry) {
    const lanes = tourViewerLanes(m, shown);
    let big = null;
    entry.a.concat(entry.b).forEach((mv) => {
      const c = ar2CardById(mv.id);
      if (!c) return;
      const v = ar2CardLaneValue(c, lanes[mv.lane], shown);
      if (!big || v > big.v) big = { c: c, v: v, who: entry.a.indexOf(mv) !== -1 ? pa : pb };
    });
    if (big && big.v >= 60) msgs.push('💥 Hatalmas lap ' + esc(big.who.name) + ' oldalán: <b>' + esc(big.c.name) + '</b> (' + big.v + ')!');
  }
  if ((prev.a - prev.b) * (cur.a - cur.b) < 0) msgs.push('🔄 FORDÍTÁS! Az állás most ' + cur.a + ' - ' + cur.b + '!');
  if (shown === 4 && m.laneMeta.some((l) => l.twist === "rejtett")) msgs.push('👁️ A rejtett tulajdonság lelepleződött!');
  if (shown === AR2_ROUNDS) msgs.push('🔥 Utolsó kör - itt dől el minden!');
  if (!msgs.length) {
    if (cur.a === cur.b) msgs.push('🎙️ Fej fej mellett haladnak - bármi lehet!');
    else msgs.push('🎙️ ' + esc((cur.a > cur.b ? pa : pb).name) + ' áll nyerésre ' + Math.max(cur.a, cur.b) + ' - ' + Math.min(cur.a, cur.b) + '-re!');
  }
  return '<div class="tourvcomment">' + msgs.slice(0, 2).join('<br>') + '</div>';
}
// a meccsnéző: egy lejátszott AI vs AI meccs körről körre visszajátszva
function tourViewerLanes(m, uptoStep) {
  const lanes = m.laneMeta.map((mt) => ({ stat: mt.stat, twist: mt.twist, twistGame: mt.twistGame || "", moonStats: mt.moonStats || null, magnetIds: [], locName: mt.locName, locImg: mt.locImg, you: [], ai: [] }));
  for (let s = 0; s < Math.min(uptoStep, m.log.length); s++) {
    m.log[s].a.forEach((mv) => { lanes[mv.lane].you.push(mv.id); if (s === AR2_ROUNDS - 1) lanes[mv.lane].magnetIds.push(mv.id); });
    m.log[s].b.forEach((mv) => { lanes[mv.lane].ai.push(mv.id); if (s === AR2_ROUNDS - 1) lanes[mv.lane].magnetIds.push(mv.id); });
    (m.log[s].strikes || []).forEach((st) => {
      const arr = lanes[st.lane][st.side];
      const ix = arr.indexOf(st.id);
      if (ix !== -1) arr.splice(ix, 1);
    });
  }
  return lanes;
}
// egy játékos "papír formája" a múltbéli eredmények alapján - a Te statod az arénastatokból,
// a mentett ellenfeleké a keret-statokból (torna, cím, dobogó), a sorsolt ismeretlen botoknak nincs múltja
function tourFormScore(p) {
  if (!p) return null;
  if (p.isYou) {
    const s = state.arenaStats || {};
    if (!s.matchesPlayed) return null;
    const ts = s.tourStats || null;
    return { games: s.matchesPlayed, pct: Math.round((s.matchesWon || 0) / s.matchesPlayed * 100), titles: ts ? (ts.titles || 0) : null, best: ts ? ts.best : null, streak: s.streak || 0 };
  }
  if (p.rosterId) {
    const r = (state.tourRoster || []).find((x) => x.id === p.rosterId);
    const st = r && r.stats;
    if (!st || !st.played) return null;
    const pct = Math.round(((st.titles || 0) * 3 + (st.seconds || 0) * 1.5 + (st.thirds || 0)) / (st.played * 3) * 100);
    return { games: st.played, pct: pct, titles: st.titles || 0, best: st.best, streak: null };
  }
  return null;
}
// a jelenlegi tornán belüli csoportállás (ha csoportkörben járunk) - friss forma, nem csak a múlt
function tourCurrentGroupLine(pid) {
  const t = state.tournament;
  if (!t || !t.groups) return null;
  const gr = t.groups.find((g) => g.ids.indexOf(pid) !== -1);
  if (!gr) return null;
  const row = tourGroupTable(gr).find((r) => r.id === pid);
  return row ? (row.pts + " pont (" + row.w + "gy " + row.d + "d " + row.l + "v), helyszín-diff: " + (row.diff > 0 ? "+" : "") + row.diff) : null;
}

  // szint = ahány csüngő van a kártyán - minden szint statpontot ad, és ez mindig látszik a kártyán

// a kollaborációs kártya mindkét felén: kurzorral megfogva mozgatható, görgővel nagyítható/kicsinyíthető a kép.
// a mozgatás a kép "középre igazított eltolása" (0 = középen), a megengedett eltolás a mindenkori nagyítástól függ:
// minél jobban rá vagy zoomolva, annál nagyobb a szabadon mozgatható terület (nagyítás nélkül nincs hova mozdulni,
// hiszen a kép pontosan kitölti a keretet - ezért kell előbb egy kicsit rázoomolni, utána viszont sokkal
// rugalmasabban lehet arrébb húzni, mint korábban).
function attachCollabDrag(root) {
  const halves = root.querySelectorAll(".tkcollab-half");
  halves.forEach((half) => {
    const side = half.getAttribute("data-collab-side");
    const img = half.querySelector(".tkcollab-img");
    if (!img || !side) return;
    const xKey = side === "A" ? "collabAX" : "collabBX";
    const yKey = side === "A" ? "collabAY" : "collabBY";
    const sKey = side === "A" ? "collabAScale" : "collabBScale";
    let dragging = false, startClientX = 0, startClientY = 0, startX = 0, startY = 0;
    img.style.cursor = "grab";
    img.onpointerdown = (e) => {
      dragging = true;
      startClientX = e.clientX; startClientY = e.clientY;
      startX = typeof state.cardDraft[xKey] === "number" ? state.cardDraft[xKey] : 0;
      startY = typeof state.cardDraft[yKey] === "number" ? state.cardDraft[yKey] : 0;
      try { img.setPointerCapture(e.pointerId); } catch (err) {}
      img.style.cursor = "grabbing";
      e.preventDefault();
    };
    img.onpointermove = (e) => {
      if (!dragging) return;
      const rect = half.getBoundingClientRect();
      const dxPct = ((e.clientX - startClientX) / rect.width) * 100;
      const dyPct = ((e.clientY - startClientY) / rect.height) * 100;
      const curScale = typeof state.cardDraft[sKey] === "number" ? state.cardDraft[sKey] : 100;
      const bound = collabMaxOffset(curScale);
      const nx = Math.max(-bound, Math.min(bound, startX + dxPct));
      const ny = Math.max(-bound, Math.min(bound, startY + dyPct));
      state.cardDraft[xKey] = nx;
      state.cardDraft[yKey] = ny;
      img.style.transform = "translate(" + nx + "%," + ny + "%) scale(" + collabEffScale(curScale) + ")";
    };
    const endDrag = (e) => {
      if (!dragging) return;
      dragging = false;
      img.style.cursor = "grab";
      try { img.releasePointerCapture(e.pointerId); } catch (err) {}
    };
    img.onpointerup = endDrag;
    img.onpointercancel = endDrag;
    img.onwheel = (e) => {
      e.preventDefault();
      const cur = typeof state.cardDraft[sKey] === "number" ? state.cardDraft[sKey] : 100;
      const next = Math.max(60, Math.min(300, cur - Math.sign(e.deltaY) * 8));
      state.cardDraft[sKey] = next;
      // ha a korábbi eltolás az új nagyítás mellett már nem férne el, visszahúzzuk a megengedett határig
      const bound = collabMaxOffset(next);
      const nx = Math.max(-bound, Math.min(bound, typeof state.cardDraft[xKey] === "number" ? state.cardDraft[xKey] : 0));
      const ny = Math.max(-bound, Math.min(bound, typeof state.cardDraft[yKey] === "number" ? state.cardDraft[yKey] : 0));
      state.cardDraft[xKey] = nx;
      state.cardDraft[yKey] = ny;
      img.style.transform = "translate(" + nx + "%," + ny + "%) scale(" + collabEffScale(next) + ")";
    };
  });
}

    h += ar2RankBarHtml(st.rankPts || 0);
    if (st.matchesPlayed > 0) {
      h += '<div class="muted" style="margin-top:6px">Meccsek: <b style="color:#EED49F">' + st.matchesPlayed + '</b> · Győzelem: <b style="color:#A6DA95">' + st.matchesWon + '</b> · Sorozat: <b style="color:#FF9F5B">' + (st.streak || 0) + ' 🔥</b> (rekord: ' + (st.bestStreak || 0) + ') · Arénában nyert arany: <b style="color:#FFD98C">' + (st.goldEarned || 0) + ' 🪙</b></div>';
    }
    h += '</div>';

    h += '<div class="card">';
    const cfg = state.arenaSetup.ais[0] || { name: "", avatar: "", difficulty: "normal" };
    h += '<label class="lbl">Ellenfeled</label>';
    h += '<div class="arenaaicfg">';
    h += '<div class="arenaaicfgavatar">' + (cfg.avatar ? '<img loading="lazy" decoding="async" src="' + esc(cfg.avatar) + '" alt="" onerror="this.style.display=\'none\'">' : '<span>🤖</span>') + '</div>';
    h += '<div style="flex:1;min-width:160px"><input class="inp arena-ainame" data-idx="0" placeholder="' + ARENA_AI_NAME_POOL[0] + '" value="' + esc(cfg.name || "") + '"></div>';
    h += '<button class="btn ghost" data-act="arena-pickaiavatar-0">Kép</button>';
    if (cfg.avatar) h += '<button class="btn ghost" data-act="arena-delaiavatar-0">✕</button>';
    h += '<input type="file" id="arena-aiavatarfile-0" accept="image/*" style="display:none">';
    h += '<div class="arenadiffrow">';
    ARENA_DIFFICULTY_ORDER.forEach((dk) => {
      const on = (cfg.difficulty || "normal") === dk;
      h += '<button class="catchip small' + (on ? " on" : "") + '"' + (on ? ' style="background:rgba(255,159,91,0.16);border-color:#FF9F5B;color:#FF9F5B"' : "") + ' data-act="arena-setdiff-0-' + dk + '">' + ARENA_DIFFICULTY[dk].label + '</button>';
    });
    h += '</div></div>';

    h += '<label class="lbl" style="margin-top:14px">Tét (a győztes viszi - tétemeléssel duplázható 🔥)</label>';
    h += '<div class="catrow" style="margin-bottom:6px">';
    AR2_STAKES.forEach((s) => {
      const on = state.arenaSetup.stake === s;
      const cant = s > 0 && goldBalance() < s;
      h += '<button class="catchip' + (on ? " on" : "") + '"' + (on ? ' style="background:rgba(255,217,140,0.16);border-color:#FFD98C;color:#FFD98C"' : "") + (cant ? " disabled" : "") + ' data-act="arena-setstake-' + s + '">' + (s === 0 ? "Barátságos 🤝" : s + " 🪙") + '</button>';
    });
    h += '</div>';
    if (state.arenaSetup.stake === 0) h += '<div class="hint">Barátságos meccsen arany nem forog, de ranglétra-pont igen.</div>';

    h += '<button class="btn primary chestbtn" data-act="arena-start" style="margin-top:16px">⚔️ Csatába!</button>';
    h += '</div>';

    // ---- Bajnokság: 16 fős kieséses torna ----
    h += tourCardHtml();
    h += tourCharactersCardHtml();
    h += tourViewerHtml();

    // ---- helyszín-fotók: csak dekoráció, meccsenként véletlenszerűen 3-at sorsol ki belőlük ----
    h += '<div class="card">';
    h += '<h2 class="cardtitle">Helyszínek 🏙️</h2>';
    h += '<div class="muted">Tölts fel városképeket - minden meccs elején a rendszer 3-at sorsol ki közülük a helyszínekhez. Csak dekoráció, a csavarra/statra nincs hatással.</div>';
    if (state.arenaLocations.length) {
      h += '<div class="arenalocgrid">';
      state.arenaLocations.forEach((loc) => {
        h += '<div class="arenalocitem">';
        h += '<button class="arenalocdel" data-act="arenaloc-del-' + loc.id + '">✕</button>';
        h += '<img loading="lazy" decoding="async" src="' + esc(loc.img) + '" alt="" onerror="this.style.opacity=0">';
        h += '<div class="arenalocitemname">' + esc(loc.name) + '</div>';
        h += '</div>';
      });
      h += '</div>';
    }
    const ld = state.arenaLocDraft;
    h += '<div class="arenalocadd">';
    h += ld.img ? '<img class="arenalocaddpreview" src="' + esc(ld.img) + '" alt="">' : '<div class="arenalocaddpreview"></div>';
    h += '<button class="btn ghost" data-act="arenaloc-pickimg">Kép</button>';
    h += '<input type="file" id="arenaloc-file" accept="image/*" style="display:none">';
    h += '<input class="inp" id="arenaloc-name" placeholder="Helyszín neve (pl. Budapest)" value="' + esc(ld.name) + '" style="flex:1;min-width:160px">';
    h += '<button class="btn primary" data-act="arenaloc-add"' + (ld.name.trim() && ld.img ? "" : " disabled") + '>Hozzáadás</button>';
    h += '</div>';
    h += '</div>';

    h += '</div>';
    return h;
  }

  // ---- élő meccs ----
  const energyLeft = g.phase === "placing" ? ar2EnergyLeft(g) : 0;
  h += '<div class="arenatable">';
  if (g.tournament) h += '<div class="muted" style="text-align:center;font-weight:800;color:#C6A0F6">🏆 Bajnoki meccs - ' + tourRefLabel(g.tournament.ref) + '</div>';

  // felső sáv: ellenfél + kör/energia/tét
  h += '<div class="ar2topbar">';
  h += '<div class="ar2foe">' + arenaAvatarHtml(g.ai) + '<div><div class="arenaplayername">' + esc(g.ai.name) + '</div><div class="arenadifftag">' + arenaDifficultyMeta(g.ai.difficulty).label + ' · kéz: ' + g.aiHand.length + ' 🂠</div></div></div>';
  h += '<div class="ar2roundbox"><div class="ar2roundlbl">Kör</div><div class="ar2roundnum">' + g.round + ' / ' + AR2_ROUNDS + '</div></div>';
  if (g.phase === "placing") {
    let pips = "";
    for (let i = 0; i < g.round; i++) pips += '<span class="ar2pip' + (i < energyLeft ? " on" : "") + '">⚡</span>';
    h += '<div class="ar2roundbox"><div class="ar2roundlbl">Energia</div><div class="ar2pips">' + pips + '</div></div>';
  }
  if (g.stake > 0) h += '<div class="ar2roundbox"><div class="ar2roundlbl">Tét</div><div class="ar2roundnum" style="color:#FFD98C">' + g.risk + ' 🪙' + (g.doubledBy ? " 🔥" : "") + '</div></div>';
  h += '</div>';

  // AI tétemelés-bejelentés: dönthetsz, hogy állod vagy feladod
  if (g.aiJustDoubled && g.phase === "reveal") {
    h += '<div class="arenaresultbanner lose" style="font-size:18px">💢 ' + esc(g.ai.name) + ' TÉTET EMELT! Már ' + g.risk + ' 🪙 forog kockán.</div>';
    h += '<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:4px">';
    h += '<button class="btn primary chestbtn" data-act="arena-nextround">💪 Állom!</button>';
    h += '<button class="btn ghost" data-act="arena-surrender">🏳️ Feladom (csak a befizetett ' + g.paid + ' 🪙 vész el)</button>';
    h += '</div>';
  }

  // ---- a 3 helyszín ----
  h += '<div class="ar2lanes">';
  g.lanes.forEach((lane, i) => {
    const visible = ar2LaneVisible(g, i);
    const twist = ar2TwistMeta(lane.twist);
    const statKnown = ar2LaneStatKnown(g, lane);
    const sm = arenaStatMeta(lane.twist === "holdfeny" ? ar2MoonStat(lane, g.round) : lane.stat);
    const canPlace = g.phase === "placing" && g.selectedCard && visible && ar2LaneRoomYou(g, lane) && (function () { const c = ar2CardById(g.selectedCard); return c && ar2Cost(c) <= energyLeft; })();
    const lw = (g.phase === "gameover" && g.result) ? g.result.laneWinners[i] : null;
    let cls = "ar2lane";
    if (!visible) cls += " hiddenlane";
    if (canPlace) cls += " placeable";
    if (lw === 1) cls += " win"; if (lw === -1) cls += " lose";
    h += '<div class="' + cls + '" style="--lc:' + AR2_LANE_COLORS[i] + '"' + (canPlace ? ' data-act="arena-placelane-' + i + '"' : "") + '>';
    const locBanner = lane.locImg ? '<img loading="lazy" decoding="async" class="ar2locbanner" src="' + esc(lane.locImg) + '" alt="" onerror="this.style.display=\'none\'">' : "";
    const locCaption = lane.locName ? '<div class="ar2locname">📍 ' + esc(lane.locName) + '</div>' : "";
    if (!visible) {
      h += locBanner;
      h += '<div class="ar2lanehead">' + locCaption + '<div class="ar2twist">🔒 Ismeretlen helyszín</div><div class="ar2stat" style="opacity:.5">a(z) ' + (i + 1) + '. körben nyílik meg</div></div>';
      h += '</div>';
      return;
    }
    h += locBanner;
    h += '<div class="ar2lanehead" title="' + esc(ar2TwistDescFor(lane)) + '">';
    h += locCaption;
    h += '<div class="ar2twist">' + twist.icon + ' ' + twist.name + (lane.twistGame ? ' · <b>' + esc(lane.twistGame) + '</b>' : '') + '</div>';
    h += '<div class="ar2stat" style="color:' + AR2_LANE_COLORS[i] + '">' + (statKnown ? sm[1] + ' ' + sm[2] : "❓ Rejtett tulajdonság") + '</div>';
    h += '<div class="ar2twistdesc">' + esc(ar2TwistDescFor(lane)) + '</div>';
    if (lane.burned && lane.burned.length) h += '<div class="ar2burned">🔥 Elégett: ' + lane.burned.map((b) => { const bc = ar2CardById(b.id); return esc(bc ? bc.name : "?"); }).join(", ") + '</div>';
    h += '</div>';
    // AI oldala (felül)
    const ta = ar2LaneTotal(lane.ai, lane, g.round);
    h += '<div class="ar2side"><div class="ar2total">' + esc(g.ai.name) + ': <b>' + (statKnown ? ta : "?") + '</b></div><div class="ar2cards">';
    lane.ai.forEach((cid) => {
      const c = ar2CardById(cid);
      if (!c) return;
      const isNew = g.phase === "reveal" && g.aiMoves.some((m) => m.id === cid && m.lane === i);
      h += ar2MiniHtml(c, { value: statKnown ? ar2CardLaneValue(c, lane, g.round) : "?", isNew: isNew });
    });
    const aiStrikesHere = (g.strikes || []).filter((s) => s.lane === i && s.side === "ai");
    aiStrikesHere.forEach((s) => { h += ar2StrikeCardHtml(ar2CardById(s.id)); });
    if (!lane.ai.length && !aiStrikesHere.length) h += '<div class="ar2emptyside">-</div>';
    h += '</div></div>';
    h += '<div class="ar2divider"></div>';
    // a Te oldalad (alul) - a lerakásra jelöltek szaggatott kerettel, kattintva visszavehetők
    const tyIds = lane.you.concat(lane.staged);
    const ty = ar2LaneTotal(tyIds, lane, g.round);
    h += '<div class="ar2side"><div class="ar2cards">';
    lane.you.forEach((cid) => {
      const c = ar2CardById(cid);
      if (c) h += ar2MiniHtml(c, { value: statKnown ? ar2CardLaneValue(c, lane, g.round) : "?" });
    });
    lane.staged.forEach((cid) => {
      const c = ar2CardById(cid);
      if (c) h += ar2MiniHtml(c, { value: statKnown ? ar2CardLaneValue(c, lane, g.round) : "?", staged: true, act: "arena-unstage-" + cid });
    });
    const youStrikesHere = (g.strikes || []).filter((s) => s.lane === i && s.side === "you");
    youStrikesHere.forEach((s) => { h += ar2StrikeCardHtml(ar2CardById(s.id)); });
    if (!tyIds.length && !youStrikesHere.length) h += '<div class="ar2emptyside">' + (canPlace ? "Ide! 👇" : "-") + '</div>';
    h += '</div><div class="ar2total you">Te: <b>' + (statKnown ? ty : "?") + '</b></div></div>';
    h += '</div>';
  });
  h += '</div>';

  // ---- fázisfüggő alsó rész ----
  if (g.phase === "gameover" && g.result) {
    const r = g.result;
    const label = r.winner === "you" ? "🏆 GYŐZELEM! " + r.youLanes + " - " + r.aiLanes
      : r.winner === "draw" ? "🤝 Döntetlen - a tét visszajár"
      : (r.surrendered ? "🏳️ Feladtad a meccset" : "😿 " + esc(g.ai.name) + " nyert " + r.aiLanes + " - " + r.youLanes + " arányban");
    h += '<div class="arenaresultbanner ' + (r.winner === "you" ? "win" : r.winner === "draw" ? "draw" : "lose") + '">' + label + '</div>';
    let lines = [];
    if (g.stake > 0) lines.push(r.goldDelta > 0 ? '<b style="color:#A6DA95">+' + r.goldDelta + ' 🪙</b>' : r.goldDelta < 0 ? '<b style="color:#ED8796">' + r.goldDelta + ' 🪙</b>' : "0 🪙");
    if (r.bonusGold > 0) lines.push('<b style="color:#FFD98C">+' + r.bonusGold + ' 🪙 Aranyláz-bónusz!</b>');
    lines.push(r.ptsDelta >= 0 ? '<b style="color:#A6DA95">+' + r.ptsDelta + ' rangpont</b>' : '<b style="color:#ED8796">' + r.ptsDelta + ' rangpont</b>');
    if (r.winner === "you" && r.streak >= 2) lines.push('<b style="color:#FF9F5B">' + r.streak + ' győzelem zsinórban! 🔥</b>');
    h += '<div class="muted" style="text-align:center;margin-top:6px">' + lines.join(" · ") + '</div>';
    h += ar2RankBarHtml(r.newPts);
    h += '<div style="text-align:center;margin-top:12px"><button class="btn primary chestbtn" data-act="arena-newmatch">' + (g.tournament ? "🏆 Vissza a bajnoksághoz" : "Új meccs ⚔️") + '</button></div>';
  } else if (g.phase === "reveal") {
    if (g.strikes && g.strikes.length) {
      g.strikes.forEach((s) => {
        const bc = ar2CardById(s.id);
        h += '<div class="arenaresultbanner lose" style="font-size:15px">⚡ VILLÁMCSAPÁS a(z) ' + (s.lane + 1) + '. helyszínen: ' + esc(bc ? bc.name : "egy lap") + ' (' + (s.side === "you" ? "a Te lapod" : esc(g.ai.name) + " lapja") + ') ELÉGETT! 🔥</div>';
      });
    }
    if (!g.aiJustDoubled) {
      h += '<div class="arenaresultbanner" style="background:rgba(198,160,246,0.12);color:#C6A0F6;box-shadow:0 0 24px rgba(198,160,246,0.15);font-size:16px">' +
        (g.aiMoves.length ? "🔮 " + esc(g.ai.name) + " lerakott " + g.aiMoves.length + " lapot!" : "😶 " + esc(g.ai.name) + " kihagyta a kört…") + '</div>';
      h += '<div style="text-align:center;margin-top:4px"><button class="btn primary chestbtn" data-act="arena-nextround">' + (g.round >= AR2_ROUNDS ? "🏁 Végeredmény" : "Következő kör ▶") + '</button></div>';
    }
  } else if (g.phase === "placing") {
    h += '<div class="muted" style="text-align:center">' + (g.selectedCard ? "👇 Kattints egy világító helyszínre a lerakáshoz - vagy a lapra még egyszer a visszavonáshoz." : "Válassz lapot a kezedből (a bal felső szám az ⚡ költsége), vagy zárd le a kört üresen is.") + '</div>';
    // a kezed: legyező, költség-jelvénnyel és a 3 helyszín-stat értékeivel
    h += '<div class="arenahandwrap">';
    const n = g.yourHand.length;
    const mid = (n - 1) / 2;
    g.yourHand.forEach((cid, idx) => {
      const c = ar2CardById(cid);
      if (!c) return;
      const off = idx - mid;
      const angle = Math.max(-16, Math.min(16, off * 6));
      const lift = Math.abs(off) * 7;
      const overlap = idx === 0 ? 0 : -54;
      const chosen = g.selectedCard === cid;
      const cost = ar2Cost(c);
      const afford = cost <= energyLeft;
      let chips = "";
      g.lanes.forEach((lane, li) => {
        if (!ar2LaneVisible(g, li)) return;
        chips += '<span class="ar2statchip" style="border-color:' + AR2_LANE_COLORS[li] + ';color:' + AR2_LANE_COLORS[li] + '">' + (ar2LaneStatKnown(g, lane) ? ar2CardLaneValue(c, lane, g.round) : "?") + '</span>';
      });
      h += '<div class="arenahandcard' + (chosen ? " chosen" : "") + (afford ? "" : " ar2noenergy") + '" style="transform:rotate(' + angle + 'deg) translateY(' + (chosen ? lift - 22 : lift) + 'px);margin-left:' + overlap + 'px;z-index:' + idx + '" data-act="arena-pickcard-' + cid + '" title="' + esc(c.name || "") + ' - költség: ' + cost + ' ⚡">' +
        '<span class="ar2cost big">' + cost + '⚡</span>' + renderCardHTML(c, { small: true }) +
        '<div class="ar2statchips">' + chips + '</div></div>';
    });
    if (!n) h += '<div class="muted">Elfogyott a kezed erre a körre - zárd le! 🙀</div>';
    h += '</div>';
    h += '<div style="text-align:center;margin-top:10px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">';
    h += '<button class="btn primary chestbtn" data-act="arena-endround">✅ Kör lezárása</button>';
    if (g.stake > 0 && !g.doubledBy && goldBalance() >= g.stake) h += '<button class="btn ghost" data-act="arena-double" title="Még egyszer befizeted a tétet, cserébe a nyeremény és a rangpont is duplázódik!">🔥 Tétemelés (+' + g.stake + ' 🪙)</button>';
    h += '</div>';
  }

  if (g.phase !== "gameover") h += '<div style="text-align:center;margin-top:10px"><button class="btn ghost" data-act="arena-surrender">🏳️ Feladás</button></div>';
  h += '</div>'; // arenatable
  h += '</div>';
  return h;
}

function renderCharmShop() {
  let h = "";
  h += '<div class="card">';
  h += '<h2 class="cardtitle">Csüngő táska 🎒</h2>';
  h += '<div class="muted">A csüngőket <b style="color:#C6A0F6">csak Szerencseládából</b> lehet kihúzni (' + Math.round(CHARM_DROP_CHANCE * 100) + '% esély ládánként). Ami a táskádban van, azt ingyen ráakaszthatod bármelyik kinyitott kártyádra - levételkor visszakerül a táskába.</div>';

  const ownedCardIds = Object.keys(state.cardAlbum).filter((id) => (state.cardAlbum[id] || 0) > 0 && state.cards.some((c) => c.id === id));
  if (!ownedCardIds.length) {
    h += '<div class="emptyday" style="display:block"><span class="bigcat">🃏</span>Még nincs kinyitott kártyád - nyiss Szerencseládát, hogy legyen mit díszíteni!</div>';
    h += '</div>';
    return h;
  }
  if (!state.charmShopCardId || !ownedCardIds.includes(state.charmShopCardId)) state.charmShopCardId = ownedCardIds[0];
  const sCard = state.cards.find((c) => c.id === state.charmShopCardId);

  h += '<label class="lbl">Melyik kártyát díszítsük?</label>';
  h += '<select class="inp" id="charmshop-card">';
  ownedCardIds.forEach((id) => {
    const c = state.cards.find((x) => x.id === id);
    if (!c) return;
    h += '<option value="' + id + '"' + (id === state.charmShopCardId ? " selected" : "") + '>' + esc(c.name || "Névtelen kártya") + '</option>';
  });
  h += '</select>';

  if (!state.charms.length) {
    h += '<div class="emptyday" style="display:block;margin-top:16px"><span class="bigcat">🔑</span>Még egy csüngő sincs megrajzolva - hozz létre egyet a "Kártya készítés → 🔑 Csüngő-müngő" fülön,<br>utána a Szerencseládákból húzhatod ki őket!</div>';
  } else {
    h += '<label class="lbl" style="margin-top:16px">Csüngőid</label>';
    h += '<div class="charmshopgrid">';
    state.charms.forEach((ch) => {
      const inv = (state.charmInv && state.charmInv[ch.id]) || 0;
      const attached = !!(sCard.charms && sCard.charms.some((x) => x.charmId === ch.id));
      h += '<div class="charmshopitem' + (!inv && !attached ? " none" : "") + '">';
      if (inv > 0) h += '<div class="charmcountbadge">×' + inv + '</div>';
      h += '<img loading="lazy" decoding="async" src="' + esc(ch.img) + '" alt="" onerror="this.style.display=\'none\'">';
      h += '<div class="charmthumbname">' + esc(ch.name || "Névtelen") + '</div>';
      if (attached) {
        h += '<button class="btn ghost" data-act="charmdetach-' + ch.id + '">Levétel<br><span style="font-size:11px;opacity:.8">vissza a táskába</span></button>';
      } else if (inv > 0) {
        h += '<button class="btn primary" data-act="charmattach-' + ch.id + '">Ráakasztás<br><span style="font-size:11px;opacity:.8">-1 a táskából</span></button>';
      } else {
        h += '<button class="btn ghost" disabled>Nincs a táskádban<br><span style="font-size:11px;opacity:.8">ládából eshet 🎁</span></button>';
      }
      h += '</div>';
    });
    h += '</div>';

    if (sCard.charms && sCard.charms.length) {
      h += '<div class="charminstlist" style="margin-top:16px">';
      sCard.charms.forEach((inst) => {
        const def = state.charms.find((x) => x.id === inst.charmId);
        if (!def) return;
        const x = typeof inst.x === "number" ? inst.x : 50;
        const sc = typeof inst.scale === "number" ? inst.scale : 100;
        const edge = inst.edge === "bottom" ? "bottom" : "top";
        h += '<div class="charminstrow" data-instid="' + inst.id + '">';
        h += '<span class="charminstname">' + esc(def.name || "Névtelen") + '</span>';
        h += '<span class="cklbl">Hol lógjon</span>';
        h += '<div class="edgetoggle">';
        h += '<button class="edgebtn' + (edge === "top" ? " on" : "") + '" data-act="charminstedgetop-' + inst.id + '">⬆ Fent</button>';
        h += '<button class="edgebtn' + (edge === "bottom" ? " on" : "") + '" data-act="charminstedgebottom-' + inst.id + '">⬇ Lent</button>';
        h += '</div>';
        h += '<span class="cklbl">↔ Pozíció</span><input type="range" min="0" max="100" class="charminst-x" data-instid="' + inst.id + '" value="' + x + '">';
        h += '<span class="cklbl">🔍 Méret</span><input type="range" min="50" max="200" class="charminst-scale" data-instid="' + inst.id + '" value="' + sc + '">';
        h += '<button class="minibtn" data-act="charminstdel-' + inst.id + '">✕</button>';
        h += '</div>';
      });
      h += '</div>';
    }

    h += '<label class="lbl" style="margin-top:16px">Élő előnézet</label>';
    h += '<div id="charmshop-preview">' + renderCardHTML(sCard, {}) + '</div>';
  }
  h += '</div>';
  return h;
}

  // ---- kipróbálás meglévő kártyán ----

  h += '<h2 class="cardtitle">Kipróbálás meglévő kártyán 🧪</h2>';

    h += '<label class="lbl" style="margin-top:14px">Koppints egy csüngőre, hogy rátedd vagy levedd a kiválasztott kártyáról:</label>';

      const on = !!(tCard.charms && tCard.charms.some((x) => x.charmId === ch.id));

    if (tCard.charms && tCard.charms.length) {
      h += '<div class="charminstlist">';
      tCard.charms.forEach((inst) => {

        if (!def) return;
        const x = typeof inst.x === "number" ? inst.x : 50;
        const sc = typeof inst.scale === "number" ? inst.scale : 100;
        const edge = inst.edge === "bottom" ? "bottom" : "top";
        h += '<div class="charminstrow" data-instid="' + inst.id + '">';
        h += '<span class="charminstname">' + esc(def.name || "Névtelen") + '</span>';
        h += '<span class="cklbl">Hol lógjon</span>';
        h += '<div class="edgetoggle">';
        h += '<button class="edgebtn' + (edge === "top" ? " on" : "") + '" data-act="charminstedgetop-' + inst.id + '">⬆ Fent</button>';
        h += '<button class="edgebtn' + (edge === "bottom" ? " on" : "") + '" data-act="charminstedgebottom-' + inst.id + '">⬇ Lent</button>';
        h += '</div>';
        h += '<span class="cklbl">↔ Pozíció</span><input type="range" min="0" max="100" class="charminst-x" data-instid="' + inst.id + '" value="' + x + '">';
        h += '<span class="cklbl">🔍 Méret</span><input type="range" min="50" max="200" class="charminst-scale" data-instid="' + inst.id + '" value="' + sc + '">';
        h += '<button class="minibtn" data-act="charminstdel-' + inst.id + '">✕</button>';
        h += '</div>';
      });
      h += '</div>';
    }

    h += '<label class="lbl" style="margin-top:16px">Élő előnézet</label>';
    h += '<div id="charm-testpreview" style="cursor:default">' + renderCardHTML(tCard, {}) + '</div>';
  }
  h += '</div>';
  return h;
}

function render() {

  const balance = goldBalance();

  html += '<span class="weeklabel">' + fmtRange(monday);
  if (state.weekOffset === 0) html += ' <span class="nowbadge">ez a hét 🐾</span>';

  html += '<button class="navbtn" data-act="nextweek">›</button>';

  html += '<span class="goldbadge" title="Egyenleged (összesen szerezve: ' + allGold + ', ezen a héten: +' + weekGold + ')">🪙 ' + balance + '</span>';
  html += '</div></div>';
  html += '<div class="headright"><div class="tabs">';
  html += '<button class="tab ' + (state.tab === "naptar" ? "on" : "") + '" data-act="tab-naptar">Naptár</button>';
  html += '<button class="tab ' + (state.tab === "stat" ? "on" : "") + '" data-act="tab-stat">Statisztika' + (overLimit ? '<span class="warnDot"></span>' : '') + '</button>';
  html += '<button class="tab ' + (state.tab === "gyujt" ? "on" : "") + '" data-act="tab-gyujt">Gyűjtemény</button>';
  html += '<button class="tab ' + (state.tab === "arena" ? "on" : "") + '" data-act="tab-arena">Aréna ⚔️</button>';
  html += '<button class="tab ' + (state.tab === "kartya" ? "on" : "") + '" data-act="tab-kartya">Kártya készítés</button>';
  html += '</div><div class="headbtns">';
  if (weekEmpty) html += '<button class="minibtn" data-act="copyprev">Előző hét másolása</button>';
  html += '<button class="minibtn" data-act="export">Export</button>';
  html += '<button class="minibtn" data-act="import">Import</button>';
  html += '<input type="file" id="importfile" accept=".json" style="display:none">';
  html += renderCloudWrap();
  html += '</div></div></div>';

  if (overLimit) html += '<div class="limitbar over">😾 Túllépted a heti játéklimitet: ' + fmtH(stats.gameTotal) + '/' + state.gameLimit + ' óra</div>';
  else if (nearLimit) html += '<div class="limitbar near">🙀 Közel a játéklimit: ' + fmtH(stats.gameTotal) + '/' + state.gameLimit + ' óra</div>';

  if (state.tab === "naptar") {
    // ---- mobil: napválasztó + bejegyzés kártyák ----
    html += '<div class="daytabs">';
    DAYS_SHORT.forEach((d, i) => {
      const has = state.entries.some(e => e.day === i);
      html += '<button class="daytab ' + (state.activeDay === i ? "on" : "") + (todayIdx === i ? " today" : "") + '" data-act="day-' + i + '">' + d + (has ? '<span class="dot"></span>' : '') + '</button>';
    });
    html += '</div>';

    const dayEntries = state.entries.filter(e => e.day === state.activeDay).sort((a, b) => a.start - b.start);
    html += '<div class="entrylist">';
    if (!dayEntries.length) {
      html += '<div class="emptyday"><span class="bigcat">🐱</span>Erre a napra még nincs semmi.<br>A + gombbal tudsz hozzáadni!</div>';
    }
    dayEntries.forEach((e) => {
      const cat = CATS[e.cat] || CATS.egyeb;
      const isNow = todayIdx === state.activeDay && nowMins >= e.start && nowMins < e.end;
      const durH = (e.end - e.start) / 60;
      html += '<button class="entrycard' + (isNow ? " nowcard" : "") + (e.img ? " hasimg" : "") + '" data-act="edit-' + e.id + '" style="' + (e.img ? '' : 'background:' + cat.soft + ';') + 'border-color:' + cat.color + '55">';
      if (e.img) {
        html += '<img loading="lazy" decoding="async" class="ecbanner" src="' + esc(e.img) + '" alt="" onerror="this.style.display=\'none\'">';
      }
      html += '<span class="ecrow">';
      html += '<span class="ecmain">';
      html += '<span class="ectime">' + fmtTime(e.start) + '–' + fmtTime(e.end) + '</span>';
      html += '<span class="ecname" style="color:' + cat.color + '">' + esc(e.name) + '</span>';
      if (e.genre) html += '<span class="ecgenre">' + esc(e.genre) + '</span>';
      if (e.note) html += '<span class="ecnote">' + esc(e.note) + '</span>';
      html += '</span>';
      html += '<span class="ecdur" style="color:' + cat.color + ';border-color:' + cat.color + '44">' + fmtH(durH) + ' ó</span>';
      html += '</span></button>';
    });
    html += '</div>';
    html += '<div class="sleepycat">🐈‍⬛ <span>zzz…</span></div>';
    html += '<button class="fab" data-act="add">+</button>';

    // ---- desktop: idővonal rács ----
    const earliest = Math.min(6 * 60, ...state.entries.map(e => Math.floor(e.start / 60) * 60));
    gridStart = isFinite(earliest) ? Math.max(0, earliest) : 6 * 60;
    const colH = (GRID_END - gridStart) / 60 * PX_PER_HOUR;
    html += '<div class="weekgrid">';
    html += '<div class="gridhead"></div>';
    DAYS.forEach((d, i) => {
      html += '<div class="gridhead' + (todayIdx === i ? " todayhead" : "") + '">' + d + '</div>';
    });
    // óra oszlop (24:00 = éjfél is kiírva)
    html += '<div class="hourcol" style="height:' + colH + 'px">';
    for (let h = gridStart / 60; h <= 24; h++) {
      const top = (h * 60 - gridStart) / 60 * PX_PER_HOUR;
      const isNowH = todayIdx >= 0 && Math.floor(nowMins / 60) === h;
      html += '<div class="hourmark' + (isNowH ? " nowhour" : "") + (h === 24 ? " midnight" : "") + '" style="top:' + top + 'px">' + (h === 24 ? "24:00" : h + ":00") + '</div>';
    }
    html += '</div>';
    // nap oszlopok
    for (let day = 0; day < 7; day++) {
      html += '<div class="daycolumn' + (todayIdx === day ? " todaycol" : "") + '" data-daycol="' + day + '" style="height:' + colH + 'px">';
      state.entries.filter(e => e.day === day).forEach((e) => {
        const cat = CATS[e.cat] || CATS.egyeb;
        const s = Math.max(e.start, gridStart), en = Math.min(e.end, GRID_END);
        if (en <= gridStart || s >= GRID_END) return;
        const top = (s - gridStart) / 60 * PX_PER_HOUR;
        const hpx = Math.max((en - s) / 60 * PX_PER_HOUR - 3, 26);
        const hasImg = !!e.img;
        html += '<button class="block' + (hasImg ? " hasimg" : "") + '" data-act="edit-' + e.id + '" data-tip="' + e.id + '" style="top:' + top + 'px;height:' + hpx + 'px;' + (hasImg ? '' : 'background:' + cat.soft.replace("0.16", "0.28") + ';') + 'border-color:' + cat.color + '66;--catglow:' + cat.color + '">';
        if (hasImg) {
          const variant = steamVariant(e.img, hpx >= 110 ? "poster" : "capsule");
          html += '<img loading="lazy" decoding="async" class="blockbg" src="' + esc(variant) + '" alt="" data-orig="' + esc(e.img) + '" onerror="if(!this.dataset.f){this.dataset.f=1;this.src=this.getAttribute(\'data-orig\')}else{this.style.display=\'none\'}">';
          html += '<span class="blockscrim"></span>';
        }
        html += '<span class="blockinfo"><span class="blocktime">' + fmtTime(e.start) + '–' + fmtTime(e.end) + '</span>';
        html += '<span class="blockname" style="color:' + (hasImg ? "#fff" : cat.color) + '">' + esc(e.name) + '</span></span>';
        html += '</button>';
      });
      if (todayIdx === day && nowMins >= gridStart && nowMins < GRID_END) {
        html += '<div class="nowline" style="top:' + ((nowMins - gridStart) / 60 * PX_PER_HOUR) + 'px"></div>';
      }
      html += '</div>';
    }
    html += '</div>';
  } else if (state.tab === "stat") {
    // ---- statisztika ----
    const cats = Object.entries(stats.perCat).sort((a, b) => b[1] - a[1]);
    const games = Object.entries(stats.games).sort((a, b) => b[1] - a[1]);
    const max = Math.max(0.001, ...cats.map(c => c[1]));
    const gameMax = Math.max(0.001, ...games.map(g => g[1]));
    const limitPct = state.gameLimit ? Math.min(100, (stats.gameTotal / state.gameLimit) * 100) : 0;
    const prev = prevWeekStats();
    const dayMax = Math.max(0.001, ...stats.perDay);
    const topDayIdx = stats.perDay.indexOf(Math.max(...stats.perDay));
    const activeDays = stats.perDay.filter(v => v > 0).length;
    const avgPerDay = activeDays ? fmtH(stats.total / activeDays) : 0;

    const delta = (cur, old) => {
      if (!prev.exists) return '';
      const d = Math.round((cur - old) * 10) / 10;
      if (d === 0) return ' <span class="delta same">± 0 a múlt héthez</span>';
      return d > 0
        ? ' <span class="delta up">▲ +' + fmtH(d) + ' óra a múlt héthez</span>'
        : ' <span class="delta down">▼ ' + fmtH(d) + ' óra a múlt héthez</span>';
    };

    html += '<div class="statwrap">';

    // arany kártya
    html += '<div class="card"><h2 class="cardtitle">Aranyad 🪙</h2>';
    html += '<div class="bignum goldnum">' + allGold + ' arany</div>';
    html += '<div class="muted">ezen a héten szereztél: <b style="color:#EED49F">+' + weekGold + '</b> 🐱</div>';
    html += '<div class="goldrates">';
    Object.entries(GOLD_RATES).forEach(([k, r]) => {
      const c = CATS[k];
      html += '<span class="goldrate" style="color:' + c.color + ';border-color:' + c.color + '33">' + c.name + ' ' + r + '/ó</span>';
    });
    html += '</div></div>';

    // arany kategóriánként, összesen (minden eddigi hét)
    const goldByCat = totalGoldByCat();
    const goldCatEntries = Object.entries(goldByCat).sort((a, b) => b[1] - a[1]);
    const goldCatMax = Math.max(0.001, ...goldCatEntries.map((x) => x[1]));
    html += '<div class="card"><h2 class="cardtitle">Arany kategóriánként (összesen) 🪙</h2>';
    if (!goldCatEntries.length) {
      html += '<div class="muted">Még nincs semmi beírva egyetlen héten sem. 🐈</div>';
    } else {
      goldCatEntries.forEach(([k, v]) => {
        const c = CATS[k] || CATS.egyeb;
        const pct = allGold > 0 ? Math.round((v / allGold) * 100) : 0;
        html += '<div class="statrow"><span class="statname">' + c.name + '</span>';
        html += '<div class="bar"><div class="barfill" style="width:' + (v / goldCatMax * 100) + '%;background:' + c.color + '"></div></div>';
        html += '<span class="stathours">' + v + ' 🪙</span>';
        html += '<span class="statpct">' + pct + '%</span></div>';
      });
    }
    html += '</div>';

    html += '<div class="card"><h2 class="cardtitle">Ez a hét összesen</h2>';
    html += '<div class="bignum">' + fmtH(stats.total) + ' óra <span style="font-size:22px">😸</span></div>';
    html += '<div class="muted">beírt tevékenység' + delta(stats.total, prev.total) + '</div>';
    if (stats.total > 0) {
      html += '<div class="miniStats">';
      html += '<div class="miniStat"><div class="miniVal">' + activeDays + '</div><div class="miniLbl">aktív nap</div></div>';
      html += '<div class="miniStat"><div class="miniVal">' + avgPerDay + '</div><div class="miniLbl">óra / aktív nap</div></div>';
      html += '<div class="miniStat"><div class="miniVal">' + DAYS_SHORT[topDayIdx] + '</div><div class="miniLbl">legsűrűbb nap</div></div>';
      html += '</div>';
    }
    html += '</div>';

    html += '<div class="card"><h2 class="cardtitle">Napi bontás</h2>';
    if (stats.total === 0) html += '<div class="muted">Még nincs semmi beírva erre a hétre. A cica türelmesen vár. 🐈</div>';
    else {
      html += '<div class="daychart">';
      stats.perDay.forEach((v, i) => {
        const hpct = (v / dayMax) * 100;
        const isTop = i === topDayIdx && v > 0;
        html += '<div class="daycol">';
        html += '<div class="dayval">' + (v > 0 ? fmtH(v) : "") + '</div>';
        html += '<div class="daybarwrap"><div class="daybar' + (isTop ? " top" : "") + '" style="height:' + Math.max(hpct, v > 0 ? 8 : 0) + '%"></div></div>';
        html += '<div class="daylbl' + (todayIdx === i ? " today" : "") + '">' + DAYS_SHORT[i] + '</div>';
        html += '</div>';
      });
      html += '</div>';
    }
    html += '</div>';

    html += '<div class="card"><h2 class="cardtitle">Kategóriák</h2>';
    if (!cats.length) html += '<div class="muted">Még nincs semmi beírva. 🐈</div>';
    cats.forEach(([k, v]) => {
      const pct = Math.round((v / stats.total) * 100);
      const c = CATS[k] || CATS.egyeb;
      html += '<div class="statrow"><span class="statname">' + c.name + '</span>';
      html += '<div class="bar"><div class="barfill" style="width:' + (v / max * 100) + '%;background:' + c.color + '"></div></div>';
      html += '<span class="stathours">' + fmtH(v) + ' ó</span>';
      html += '<span class="statpct">' + pct + '%</span></div>';
    });
    html += '</div>';

    html += '<div class="card"><h2 class="cardtitle">Játékidő 🎮🐱</h2>';
    if (!games.length) html += '<div class="muted">Ezen a héten (még) nem játszottál. Vagy csak nem írtad be. A cica figyel. 👀🐈‍⬛</div>';
    else {
      html += '<div class="muted" style="margin-bottom:12px">' + fmtH(stats.gameTotal) + ' óra összesen, a heti idő ' + Math.round((stats.gameTotal / stats.total) * 100) + '%-a' + delta(stats.gameTotal, prev.gameTotal) + '</div>';
    }
    games.forEach(([name, v]) => {
      const pct = Math.round((v / stats.gameTotal) * 100);
      const genre = stats.gameGenres[name];
      html += '<div class="statrow"><span class="statname" title="' + esc(name) + (genre ? ' – ' + esc(genre) : '') + '">' + esc(name);
      if (genre) html += '<span class="statgenre">' + esc(genre) + '</span>';
      html += '</span>';
      html += '<div class="bar"><div class="barfill" style="width:' + (v / gameMax * 100) + '%;background:' + CATS.jatek.color + '"></div></div>';
      html += '<span class="stathours">' + fmtH(v) + ' ó</span>';
      html += '<span class="statpct">' + pct + '%</span></div>';

      html += '<label class="lbl">Bal oldali kép</label>';
      html += '<div class="imgrow">';
      if (draft.collabImgA) html += '<img loading="lazy" decoding="async" src="' + esc(draft.collabImgA) + '" alt="" class="imgprev" onerror="this.style.display=\'none\'">';

      html += '<input class="inp" id="ck-collabaurl" placeholder="…vagy illessz be egy kép linket" style="margin-top:8px" value="' + esc(draft.collabImgA && draft.collabImgA.indexOf("data:") !== 0 ? draft.collabImgA : "") + '">';

      html += '<label class="lbl" style="margin-top:14px">Jobb oldali kép</label>';
      html += '<div class="imgrow">';
      if (draft.collabImgB) html += '<img loading="lazy" decoding="async" src="' + esc(draft.collabImgB) + '" alt="" class="imgprev" onerror="this.style.display=\'none\'">';

      if (draft.collabImgB) html += '<button class="btn ghost" data-act="ckdelcollabb">Törlés</button>';

    } else {

      html += '<input type="file" id="ck-bgfile" accept="image/*" style="display:none">';
      html += '</div>';
      html += '<input class="inp" id="ck-bgurl" placeholder="…vagy illessz be egy kép linket" style="margin-top:8px" value="' + esc(draft.bgImg && draft.bgImg.indexOf("data:") !== 0 ? draft.bgImg : "") + '">';

      html += '</div>';
      html += '<input class="inp" id="ck-charurl" placeholder="…vagy illessz be egy kép linket" style="margin-top:8px" value="' + esc(draft.charImg && draft.charImg.indexOf("data:") !== 0 ? draft.charImg : "") + '">';
      if (draft.bgImg || draft.charImg) html += '<div class="hint ok">A kettő együtt is használható: a háttér a teljes kártyát kitölti, a karakter kép fölötte helyezkedik el. 😺</div>';

      if (draft.charImg) {

        const cy = typeof draft.charY === "number" ? draft.charY : 50;

        html += '<span class="ckstatval" id="ck-charscale-val">' + cs + '</span></div>';
      }
    }

    html += '<label class="lbl">Statok</label>';
    const rBonusDraft = RARITY_BONUS[draft.rarity] || 0;
    if (rBonusDraft) {
      html += '<div class="hint ok">🔥 A(z) ' + RARITY_LABEL_HU[draft.rarity] + ' kártyatípus miatt a statok alapból 50 helyett 50+' + rBonusDraft + ' = ' + (50 + rBonusDraft) + ' ponttal indulnak. Jelenleg a 💀 Főellenfél ad a legtöbb plusszal (+' + RARITY_BONUS.foellenfel + ').</div>';
    } else {
      html += '<div class="hint">Sima kártyatípusnál a statok az alap 50 ponttal indulnak, plusz bónusz nélkül - válassz speckó kinézetet, hogy jusson némi extra. Jelenleg a 💀 Főellenfél ad a legtöbb plusszal (+' + RARITY_BONUS.foellenfel + ').</div>';

    [["ero", "💪 Erő"], ["gyorsasag", "⚡ Gyorsaság"], ["esz", "🧠 Ész"], ["vedekezes", "🛡️ Védekezés"], ["csabitas", "💋 Csábítás"]].forEach(([key, lbl]) => {

    if (typeof draft.energy !== "number") draft.energy = 3;
    html += '<label class="lbl" style="margin-top:10px">⚡ Energiaköltség Arénában</label>';
    html += '<div class="hint">Ennyi energiádba kerül lerakni ezt a lapot egy Aréna-körben (1 = olcsó, gyenge kezdőlap - 6 = drága, csak késői körben megengedhető ütőkártya). Alapból a statjaid alapján van beállítva, de itt szabadon felülírhatod.</div>';
